name: owl-command-center

services:
  owl:
    image: ${OWL_IMAGE:-asos-tools-ui:local}
    container_name: owl-ui
    restart: unless-stopped
    init: true
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      DATABASE_URL: ${DATABASE_URL:-postgres://owl:owl@postgres:5432/owl}
      APPLICATIONINSIGHTS_CONNECTION_STRING: ${APPLICATIONINSIGHTS_CONNECTION_STRING:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AI_BRIEF_MODEL: ${AI_BRIEF_MODEL:-gpt-4o}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/ready >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s
    cpus: 8
    mem_limit: 16g
    logging:
      driver: json-file
      options:
        max-size: "25m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    container_name: owl-redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - 2gb
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 20s
      timeout: 3s
      retries: 5
    cpus: 2
    mem_limit: 3g
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:16-alpine
    container_name: owl-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-owl}
      POSTGRES_USER: ${POSTGRES_USER:-owl}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-owl} -d ${POSTGRES_DB:-owl}"]
      interval: 20s
      timeout: 5s
      retries: 5
    cpus: 4
    mem_limit: 8g
    shm_size: 1g
    logging:
      driver: json-file
      options:
        max-size: "25m"
        max-file: "5"

  caddy:
    image: caddy:2-alpine
    container_name: owl-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      OWL_HOSTNAME: ${OWL_HOSTNAME:-owl.local}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      owl:
        condition: service_healthy
    cpus: 2
    mem_limit: 1g
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  redis-data:
  postgres-data:
  caddy-data:
  caddy-config:
