name: Deploy to Azure Container Apps

# Builds the Next.js image in ACR and rolls the Container App on every
# push to main.  Auth via OIDC (no stored secrets) — set up the
# federated credential on the asos-tools-deploy app registration:
#
#   az ad app create --display-name asos-tools-deploy
#   APP_ID=$(az ad app list --display-name asos-tools-deploy --query [0].appId -o tsv)
#   az ad sp create --id $APP_ID
#   az role assignment create --assignee $APP_ID --role Contributor \
#       --scope /subscriptions/SUB_ID/resourceGroups/asos-rg
#   az ad app federated-credential create --id $APP_ID --parameters '{
#       "name":"github-main",
#       "issuer":"https://token.actions.githubusercontent.com",
#       "subject":"repo:OWNER/REPO:ref:refs/heads/main",
#       "audiences":["api://AzureADTokenExchange"]}'
#
# Then set GitHub secrets:
#   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#
# Repo vars (optional — defaults baked in):
#   AZURE_RG (default asos-rg), ACR_NAME (default asosacr33821),
#   AZ_APP (default asos-tools-ui), AZ_LOC (default eastus)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write          # OIDC federation with Entra ID
  contents: read

concurrency:
  group: azure-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    # Emits a single signal: are the OIDC secrets configured?
    # If not, the deploy job is skipped — keeping the run green rather
    # than red-failing every push while OIDC is pending Entra approval.
    runs-on: ubuntu-latest
    outputs:
      has_oidc: ${{ steps.check.outputs.has_oidc }}
    steps:
      - id: check
        env:
          HAVE_CLIENT: ${{ secrets.AZURE_CLIENT_ID != '' }}
          HAVE_TENANT: ${{ secrets.AZURE_TENANT_ID != '' }}
          HAVE_SUB:    ${{ secrets.AZURE_SUBSCRIPTION_ID != '' }}
        run: |
          if [ "$HAVE_CLIENT" = "true" ] && [ "$HAVE_TENANT" = "true" ] && [ "$HAVE_SUB" = "true" ]; then
            echo "has_oidc=true" >> "$GITHUB_OUTPUT"
            echo "::notice::OIDC secrets present — deploy will run"
          else
            echo "has_oidc=false" >> "$GITHUB_OUTPUT"
            echo "::notice::OIDC secrets NOT set — deploy skipped. Configure AZURE_CLIENT_ID / AZURE_TENANT_ID / AZURE_SUBSCRIPTION_ID after Entra admin enables app registration for this account."
          fi

  deploy:
    needs: preflight
    if: needs.preflight.outputs.has_oidc == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      RG:    ${{ vars.AZURE_RG    || 'asos-rg' }}
      ACR:   ${{ vars.ACR_NAME    || 'asosacr33821' }}
      APP:   ${{ vars.AZ_APP      || 'asos-tools-ui' }}
      LOC:   ${{ vars.AZ_LOC      || 'eastus' }}
      IMG_TAG: v0.${{ github.run_number }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build image in ACR
        run: |
          az acr build \
            --registry "$ACR" \
            --image "asos-tools-ui:${IMG_TAG}" \
            --image "asos-tools-ui:latest" \
            --file Dockerfile \
            --no-logs \
            .

      - name: Update Container App revision
        run: |
          az containerapp update \
            --resource-group "$RG" \
            --name "$APP" \
            --image "${ACR}.azurecr.io/asos-tools-ui:${IMG_TAG}" \
            --query "properties.configuration.ingress.fqdn" -o tsv

      - name: Smoke test
        run: |
          FQDN=$(az containerapp show -g "$RG" -n "$APP" \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          URL="https://${FQDN}"
          echo "Smoke testing $URL ..."
          for path in "/" "/aomc" "/forecasters" "/reports" "/stations" "/admin" "/about"; do
            sleep 2
            code=$(curl -s -o /dev/null -w "%{http_code}" "$URL$path")
            echo "  $code  $path"
            if [ "$code" != "200" ] && [ "$code" != "302" ]; then
              echo "::error::route $path returned $code"
              exit 1
            fi
          done
          echo "::notice::Deployment ${IMG_TAG} live at $URL"
