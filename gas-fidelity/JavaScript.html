            function syncViewPadding(){
        const viewDiv = document.getElementById("viewDiv");
        if (!viewDiv || !window._esriView) return;

        const view = window._esriView;
        const v = viewDiv.getBoundingClientRect();

        const rect = (el) => (el ? el.getBoundingClientRect() : null);
        const overlapX = (a,b) => Math.max(0, Math.min(a.right,b.right) - Math.max(a.left,b.left));
        const overlapY = (a,b) => Math.max(0, Math.min(a.bottom,b.bottom) - Math.max(a.top,b.top));

        // Sidebars + toggles
        const leftEl   = document.querySelector("#sidebar");
        const rightEl  = document.querySelector("#rightSidebar, .right-sidebar, .sidebar-right");
        const headerEl = document.querySelector("#header");
        const leftToggle  = document.getElementById("toggleSidebarBtn");
        const rightToggle = document.getElementById("toggleRightSidebarBtn");

        let left = 0, right = 0, top = 0;

        // Sidebar overlaps
        const l = rect(leftEl);
        if (l && overlapY(v,l) > 0) left = overlapX(v,l);

        const r = rect(rightEl);
        if (r && overlapY(v,r) > 0) right = overlapX(v,r);

        // Toggle overlaps (these were causing the popup edge to be covered)
        const lt = rect(leftToggle);
        if (lt && overlapY(v,lt) > 0) left += overlapX(v,lt);

        const rt = rect(rightToggle);
        if (rt && overlapY(v,rt) > 0) right += overlapX(v,rt);

        // Top header overlap (only if it physically overlays the map)
        const h = rect(headerEl);
        if (h && overlapX(v,h) > 0) top = Math.max(0, h.bottom - v.top);

        view.padding = {
          left:   Math.round(Math.max(0, left)),
          right:  Math.round(Math.max(0, right)),
          top:    Math.round(Math.max(0, top)),
          bottom: 0
        };

        // Keep your zoom dock aligned with visible map area
        if (window._zoomDock){
          window._zoomDock.style.left = (view.padding.left + 10) + "px";
          window._zoomDock.style.top  = (view.padding.top  + 10) + "px";
        }

        try { positionMapClockBar_(); } catch(_) {}

      }






    });

/* ===========================
 * Active user heartbeat
 * - ping on load
 * - ping every 4 minutes
 * - ping when tab becomes visible again
 * =========================== */
let __heartbeatTimer = null;
const HEARTBEAT_INTERVAL_MS = 4 * 60 * 1000; // 4 minutes

function sendHeartbeat_() {
  try {
    if (!google || !google.script || !google.script.run) return;

    google.script.run
      .withFailureHandler(function(err){
        console.warn("Heartbeat failed:", err);
      })
      .recordHeartbeat();
  } catch (e) {
    console.warn("Heartbeat error:", e);
  }
}

function startHeartbeat_() {
  // fire once immediately
  sendHeartbeat_();

  // avoid duplicate timers
  if (__heartbeatTimer) {
    clearInterval(__heartbeatTimer);
  }

  __heartbeatTimer = setInterval(() => {
    // only ping while tab is visible
    if (!document.hidden) {
      sendHeartbeat_();
    }
  }, HEARTBEAT_INTERVAL_MS);
}

// when the user comes back to the tab, refresh presence immediately
document.addEventListener("visibilitychange", () => {
  if (!document.hidden) {
    sendHeartbeat_();
  }
});

/* ===== Startup ===== */
function startAppWhenReady(){
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', startAppWhenReady);
    return;
  }
  if (typeof window.require !== 'function') {
    setTimeout(startAppWhenReady, 50);
    return;
  }
  try{
    initializeApp();
    initMapClockBar_();
    updateLastUpdatedBanner(); // populate left banner on load
    wireCollapsiblesWithRetry();
    startHeartbeat_();
    setInterval(updateTimerDisplay,1000);

    // Kick data load after the shell/map init starts,
    // so the map frame appears first.
    setTimeout(function () {
      try { fetchData(false); } catch (e) { console.error(e); }
    }, 0);
  }catch(e){
    console.error(e);
    alert('Startup error: ' + e.message);
  }
}
startAppWhenReady();

 * =========================== */
(function () {
  if (window.installAboutHelp) return;

  function openAboutHelp() {
    const overlay = document.getElementById("aboutHelpOverlay");
    const modal   = document.getElementById("aboutHelpModal");
    if (!overlay || !modal) return;

    overlay.style.display = "block";
    modal.style.display   = "block";
    overlay.setAttribute("aria-hidden", "false");
  }

  function closeAboutHelp() {
    const overlay = document.getElementById("aboutHelpOverlay");
    const modal   = document.getElementById("aboutHelpModal");
    if (!overlay || !modal) return;

    overlay.style.display = "none";
    modal.style.display   = "none";
    overlay.setAttribute("aria-hidden", "true");
  }

  function toggleAboutHelp() {
    const modal = document.getElementById("aboutHelpModal");
    if (!modal) return;
    const isOpen = (modal.style.display === "block");
    if (isOpen) closeAboutHelp();
    else openAboutHelp();
  }

  window.installAboutHelp = function installAboutHelp() {
    const btn     = document.getElementById("aboutHelpBtn");
    const overlay = document.getElementById("aboutHelpOverlay");
    const closeBtn= document.getElementById("aboutHelpCloseBtn");

    // If About.html isn't included yet, just no-op safely.
    if (!btn || !overlay || !closeBtn) return;

    btn.addEventListener("click", (e) => {
      e.preventDefault();
      toggleAboutHelp();
    });

    closeBtn.addEventListener("click", (e) => {
      e.preventDefault();
      closeAboutHelp();
    });

    overlay.addEventListener("click", () => closeAboutHelp());

    // Keyboard shortcuts:
    // - Esc closes
    // - ? toggles (Shift+/ on most keyboards)
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        closeAboutHelp();
        return;
      }
      if (e.key === "?" || (e.key === "/" && e.shiftKey)) {
        // Avoid stealing input focus when typing in text fields
        const tag = (document.activeElement && document.activeElement.tagName) ? document.activeElement.tagName.toLowerCase() : "";
        const isTyping = (tag === "input" || tag === "textarea" || document.activeElement?.isContentEditable);
        if (!isTyping) toggleAboutHelp();
      }
    });
  };

  // Auto-install (works whether scripts load before or after DOM is ready)
  function boot() {
    try { window.installAboutHelp(); } catch(_) {}
  }
  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", boot);
  else boot();
})();

/***********************
 * WWA LIST POPUP (Undocked) - CLEAN (single implementation)
 * - Opens from #wwaListLink
 * - Chunked fetch from server: getWwaListChunk(offset, limit)
 * - Client-side filter over loaded rows
 ***********************/
(function(){
  const POP_ID = "wwaListPopup";

  // Prevent double-install
  if (window.__wwaListInstalled) return;
  window.__wwaListInstalled = true;

  const state = {
    header: [],
    rows: [],
    offset: 0,
    done: false,
    loading: false,
    limit: 250
  };

  const $ = (id) => document.getElementById(id);

  function setStatus(msg){
    const el = $("wwaListPopupStatus");
    if (el) el.textContent = msg || "";
  }

  function setCount(n){
    const el = $("wwaListPopupCount");
    if (el) el.textContent = String(n || 0);
  }

  function showPopup(){
    const pop = $(POP_ID);
    if (!pop) {
      console.warn("[WWA List] popup container not found (#" + POP_ID + ")");
      return;
    }

    // 🔥 CRITICAL: escape any stacking context by making popup a direct BODY child
    // (ArcGIS/containers often use transform/filter/backdrop-filter which traps z-index)
    try {
      if (pop.parentElement !== document.body) {
        document.body.appendChild(pop);
        console.log("[WWA List] popup re-parented to <body>");
      } else {
        // still move to end so it paints last
        document.body.appendChild(pop);
      }
    } catch(e){
      console.warn("[WWA List] could not re-parent popup:", e);
    }

    // FORCE visibility regardless of CSS issues / stacking contexts
    pop.style.display = "block";
    pop.style.position = "fixed";
    pop.style.left = "80px";
    pop.style.top = "80px";
    pop.style.right = "auto";
    pop.style.bottom = "auto";
    pop.style.width = "min(980px, calc(100vw - 40px))";
    pop.style.height = "min(560px, calc(100vh - 160px))";

    // Make it impossible to be "invisible"
    pop.style.background = "#fff";
    pop.style.border = "3px solid #ff00aa";     // loud outline
    pop.style.boxShadow = "0 18px 50px rgba(0,0,0,0.25)";
    pop.style.zIndex = "2147483647";
    pop.style.opacity = "1";
    pop.style.visibility = "visible";
    pop.style.pointerEvents = "auto";

    // Break out of any inherited transforms/filters from parents
    pop.style.transform = "none";
    pop.style.filter = "none";
    pop.style.backdropFilter = "none";
    pop.style.isolation = "isolate"; // new stacking context at top-level

    pop.setAttribute("aria-hidden", "false");

    const r = pop.getBoundingClientRect();
    console.log("[WWA List] popup shown rect:",
      JSON.stringify({ left:r.left, top:r.top, w:r.width, h:r.height, display:getComputedStyle(pop).display, z:getComputedStyle(pop).zIndex })
    );
  }

  function hidePopup(){
    const pop = $(POP_ID);
    if (!pop) return;
    console.log("[WWA List] hidePopup called");
    pop.style.display = "none";
    pop.setAttribute("aria-hidden", "true");
  }

  function escapeHtml(s){
    return String(s)
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  function renderTable(filterText){
    const table = $("wwaListPopupTable");
    const thead = table ? table.querySelector("thead") : null;
    const tbody = table ? table.querySelector("tbody") : null;
    if (!thead || !tbody) return;

    const f = (filterText || "").trim().toLowerCase();

    const h = state.header || [];
    thead.innerHTML = "<tr>" + h.map(x => `<th>${escapeHtml(x || "")}</th>`).join("") + "</tr>";

    const src = state.rows || [];
    const filtered = (!f)
      ? src
      : src.filter(r => r.some(cell => String(cell || "").toLowerCase().includes(f)));

    tbody.innerHTML = filtered.map(r =>
      "<tr>" + r.map(v => `<td>${escapeHtml(v || "")}</td>`).join("") + "</tr>"
    ).join("");

    setCount(filtered.length);

    if (state.loading) setStatus("Loading…");
    else if (state.done) setStatus("All rows loaded");
    else setStatus(`Loaded ${state.rows.length} (more available)`);
  }

  function fetchNext(reset){
    if (state.loading) return;
    state.loading = true;

    if (reset){
      state.header = [];
      state.rows = [];
      state.offset = 0;
      state.done = false;
      setCount(0);
    }

    setStatus("Loading…");

    google.script.run
      .withSuccessHandler((res) => {
        state.loading = false;

        if (!res || res.ok !== true){
          console.warn("[WWA List] server returned error:", res);
          setStatus("Server error");
          return;
        }

        if (!state.header.length && Array.isArray(res.header)) state.header = res.header;

        if (Array.isArray(res.rows) && res.rows.length){
          state.rows = state.rows.concat(res.rows);
        }

        state.offset = Number(res.nextOffset || state.offset || 0);
        state.done = !!res.done;

        const q = $("wwaListPopupSearch")?.value || "";
        renderTable(q);
      })
      .withFailureHandler((err) => {
        state.loading = false;
        console.warn("[WWA List] google.script.run failure:", err);
        setStatus("Server failure");
      })
      .getWwaListChunk(state.offset, state.limit);
  }

  function openPopup(){
    showPopup();

    // first open => fetch initial chunk
    if (!state.rows.length && !state.loading){
      fetchNext(true);
    } else {
      renderTable($("wwaListPopupSearch")?.value || "");
    }
    return false;
  }

  // Global opener for inline link
  window.__wwaListOpenFromLink = function(ev){
    try{
      ev?.preventDefault?.();
      ev?.stopPropagation?.();
    }catch(_){}
    return openPopup();
  };

  // Dragging (mouse)
  function makeDraggable(){
    const pop = $(POP_ID);
    const hdr = $("wwaListPopupHeader");
    if (!pop || !hdr) return;

    let dragging = false;
    let startX = 0, startY = 0, startLeft = 0, startTop = 0;

    hdr.addEventListener("mousedown", (e) => {
      dragging = true;
      const rect = pop.getBoundingClientRect();
      startX = e.clientX;
      startY = e.clientY;
      startLeft = rect.left;
      startTop  = rect.top;

      pop.style.left = startLeft + "px";
      pop.style.top  = startTop + "px";
      pop.style.right = "auto";
      pop.style.bottom = "auto";
      pop.style.position = "fixed";

      document.body.style.userSelect = "none";
    });

    window.addEventListener("mousemove", (e) => {
      if (!dragging) return;
      const dx = e.clientX - startX;
      const dy = e.clientY - startY;
      pop.style.left = (startLeft + dx) + "px";
      pop.style.top  = (startTop + dy) + "px";
    });

    window.addEventListener("mouseup", () => {
      if (!dragging) return;
      dragging = false;
      document.body.style.userSelect = "";
    });
  }

  function wireUi(){
  // Bulletproof click hook for Apps Script sandbox:
  // - Delegated (works even if link is rebuilt later)
  // - Capture-phase (wins even if something else stops bubbling)
  if (!document.body.dataset.wwalistDelegated){
    document.body.dataset.wwalistDelegated = "1";

    document.addEventListener("click", (ev) => {
      const t = ev.target;
      const hit = t && t.closest && t.closest("#wwaListLink,[data-wwa-list-open='1'],.wwa-list-link");
      if (!hit) return;

      // You should ALWAYS see this line when clicking the link.
      console.log("[WWA List] click captured");

      try { ev.preventDefault(); } catch(_){}
      try { ev.stopPropagation(); } catch(_){}

      // Open popup (and fetch chunk 1 on first open)
      if (typeof window.__wwaListOpenFromLink === "function"){
        window.__wwaListOpenFromLink(ev);
      } else {
        console.warn("[WWA List] opener missing (__wwaListOpenFromLink not a function)");
      }
    }, true); // <-- capture-phase
  }

    $("wwaListPopupCloseBtn")?.addEventListener("click", hidePopup);

    $("wwaListPopupMinBtn")?.addEventListener("click", () => {
      const body = $("wwaListPopupBody");
      if (!body) return;
      const isHidden = body.style.display === "none";
      body.style.display = isHidden ? "block" : "none";
    });

    $("wwaListPopupSearch")?.addEventListener("input", (e) => {
      renderTable(e.target.value || "");
    });

    $("wwaListPopupClear")?.addEventListener("click", () => {
      const s = $("wwaListPopupSearch");
      if (s) s.value = "";
      renderTable("");
    });

    $("wwaListPopupReload")?.addEventListener("click", () => {
      fetchNext(true);
    });

    $("wwaListPopupMore")?.addEventListener("click", () => {
      if (state.done) {
        setStatus("All rows loaded");
        return;
      }
      fetchNext(false);
    });

    makeDraggable();
  }

  if (document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", wireUi);
  } else {
    wireUi();
  }
})();
