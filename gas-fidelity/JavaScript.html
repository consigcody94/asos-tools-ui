      dbg("graphicIndex ctor:", graphicIndex?.constructor?.name, "size:", graphicIndex?.size);
      dbg("isNativeMap?", graphicIndex instanceof NativeMap);

      // --- Symbol cache: key -> picture-marker symbol ---
      const symbolCache = new NativeMap();

      // Zoom helper (Extent-based, Pacific-friendly, OUTLIER-SMART for global programs)
      function zoomToFeatures_(featureList) {
        const view = window._esriView;
        if (!view || !Array.isArray(featureList) || !featureList.length) return;

        // Collect valid points
        const pts = [];
        for (const f of featureList) {
          const c = f?.geometry?.coordinates || [];
          const lon = Number(c[0]);
          const lat = Number(c[1]);
          if (Number.isFinite(lon) && Number.isFinite(lat)) pts.push({ lon, lat });
        }
        if (!pts.length) return;

        // 1 point: zoom in close
        if (pts.length === 1) {
          const vp = view.padding || { left:0, right:0, top:0, bottom:0 };
          const goPad = {
            left: vp.left || 0,
            right: vp.right || 0,
            top: vp.top || 0,
            bottom: vp.bottom || 0
          };

          view.goTo(
            { center: [pts[0].lon, pts[0].lat], zoom: Math.max(10, view.zoom || 4) },
            { animate: true, duration: 450, padding: goPad }
          ).catch(e => console.warn("zoomToFeatures_ rejected:", e));

          return;
        }

        const min = (a) => a.reduce((m, v) => Math.min(m, v), +Infinity);
        const max = (a) => a.reduce((m, v) => Math.max(m, v), -Infinity);
        const median = (arr) => {
          const a = arr.slice().sort((x, y) => x - y);
          const m = Math.floor(a.length / 2);
          return (a.length % 2) ? a[m] : (a[m - 1] + a[m]) / 2;
        };

        // ---- NEW: AOI-based "core focus" when points are global ----
        // These are just for choosing a zoom TARGET subset (we still render everything).
        const AOIS = [
          // Broad NWS-ish North America focus (CONUS + AK + HI + PR-ish)
          { name: "NA",  xmin: -170, xmax:  -45, ymin:   5, ymax:  75, crossesDateline: false, fallbackCenter: [-105, 38] },
          // Dateline-crossing Pacific focus (useful when points spread across AK/HI/Pac)
          { name: "PAC", xmin:  150, xmax: -110, ymin: -20, ymax:  70, crossesDateline: true,  fallbackCenter: [-160, 20] },
        ];

        const inAoi = (lon, lat, aoi) => {
          if (lat < aoi.ymin || lat > aoi.ymax) return false;
          if (!aoi.crossesDateline) return (lon >= aoi.xmin && lon <= aoi.xmax);
          // crosses dateline: e.g. 150E .. -110W
          return (lon >= aoi.xmin || lon <= aoi.xmax);
        };

        // pick AOI with most points inside
        let best = null;
        let bestCount = -1;
        for (const aoi of AOIS) {
          let c = 0;
          for (const p of pts) if (inAoi(p.lon, p.lat, aoi)) c++;
          if (c > bestCount) { bestCount = c; best = aoi; }
        }

        // If a meaningful chunk of points fall inside an AOI, use only those for zoom target.
        // (Prevents UA/BUOYS global points from forcing a world view.)
        const minNeeded = Math.max(10, Math.floor(pts.length * 0.15)); // 15% or 10 points
        const zoomPts = (best && bestCount >= minNeeded)
          ? pts.filter(p => inAoi(p.lon, p.lat, best))
          : pts;

        // ---- Wrap-safe extent building (your original logic, applied to zoomPts) ----
        const lons = zoomPts.map(p => p.lon);
        const lats = zoomPts.map(p => p.lat);

        const xminRaw = min(lons), xmaxRaw = max(lons);
        const ymin = min(lats), ymax = max(lats);

        const rawLonSpan = xmaxRaw - xminRaw;
        const latSpan = ymax - ymin;

        // Try wrapped longitudes (0..360) to handle dateline nicely
        const lons360 = lons.map(x => (x < 0 ? x + 360 : x));
        const xmin360 = min(lons360), xmax360 = max(lons360);
        const wrapLonSpan = xmax360 - xmin360;

        const useWrapped = wrapLonSpan < rawLonSpan;
        const lonSpan = useWrapped ? wrapLonSpan : rawLonSpan;

        // If STILL extremely wide after AOI attempt, do a reasonable regional fallback
        const WIDE_SPAN_DEG = 150;
        if (Math.max(lonSpan, latSpan) >= WIDE_SPAN_DEG) {
          const c = best?.fallbackCenter || [-160, 20]; // Pacific-leaning fallback
          view.goTo({ center: c, zoom: 3.5 }, { animate: true, duration: 450 })
            .catch(e => console.warn("zoomToFeatures_ rejected:", e));
          return;
        }

        const refLon = (() => {
          if (useWrapped) {
            const m360 = median(lons360);
            return (m360 > 180) ? (m360 - 360) : m360;
          }
          return median(lons);
        })();

        const unwrapLon = (lon, ref) => {
          let x = lon;
          while (x - ref > 180) x -= 360;
          while (x - ref < -180) x += 360;
          return x;
        };

        const adjLons = lons.map(l => unwrapLon(l, refLon));
        let xmin = min(adjLons);
        let xmax = max(adjLons);

        // shift back into [-180, 180] if needed
        let shift = 0;
        if (xmax > 180) shift = -360;
        else if (xmin < -180) shift = 360;
        xmin += shift;
        xmax += shift;

        const MIN_SPAN_DEG = 0.8;
        const spanLon = Math.max(xmax - xmin, MIN_SPAN_DEG);
        const spanLat = Math.max(ymax - ymin, MIN_SPAN_DEG);

        const padLon = Math.max(spanLon * 0.12, MIN_SPAN_DEG * 0.5);
        const padLat = Math.max(spanLat * 0.12, MIN_SPAN_DEG * 0.5);

        const extent = new Extent({
          xmin: xmin - padLon,
          ymin: ymin - padLat,
          xmax: xmax + padLon,
          ymax: ymax + padLat,
          spatialReference: { wkid: 4326 }
        });

        const vp = view.padding || { left:0, right:0, top:0, bottom:0 };

        // ✅ Symmetric top/bottom padding ONLY for the goTo fit.
        // This centers results in the *visible* map area without moving attribution.
        const goPad = {
          left:   vp.left  || 0,
          right:  vp.right || 0,
          top:    vp.top   || 0,
          bottom: vp.top   || 0
        };

        view.goTo(
          { target: extent },
          { animate: true, duration: 450, padding: goPad }
        ).catch(e => console.warn("zoomToFeatures_ rejected:", e));

      }

      function getSymbol(status, zoom, program, ring) {
        const st = normStatus(status);
        const isDown = (st === "down" || st === "svcbu");
        const isDegraded = (st === "degraded");
        const isPatching = (st === "patching");

        // color priority: Down > Patching > Degraded > Up
        const fill = isDown ? "red" : (isPatching ? "#1e63ff" : (isDegraded ? "#ffd400" : "green"));

        // Text color: black on yellow, white otherwise
        const textFill = isDegraded ? "black" : "white";

        // ✅ Read UI sliders (these were previously not affecting picture-marker SVGs)
        const iconScale = clamp(parseFloat(window.__uiIconScale ?? 1), 0.5, 3.0);
        const iconFontScale = clamp(parseFloat(window.__uiIconFontScale ?? 1), 0.5, 3.0);

        // keep your sizing logic
        const base =
          isDown      ? 5 :
          isDegraded  ? 4 :
                        3;

        const size = base + zoom * 0.6;
        const px = Math.max(8, Math.round(size * 2));

        const letter = programToLetter(program) || "";
        const isTwo = (String(letter || "").length >= 2);

        // 2-letter badges: tiny bump
        let pxAdj = isTwo ? (px + 4) : px;

        // ✅ Apply ICON SIZE scale to the actual SVG resolution
        pxAdj = Math.max(8, Math.round(pxAdj * iconScale));

        // Base reduction knob (your original)
        const ICON_FONT_BASE = 0.82;

        // ✅ Apply ICON FONT scale inside SVG text sizing
        const ICON_FONT_SCALE = ICON_FONT_BASE * iconFontScale;

        const fontSize = isTwo
          ? Math.max(6, Math.round(pxAdj * 0.44 * ICON_FONT_SCALE))
          : Math.max(6, Math.round(pxAdj * 0.50 * ICON_FONT_SCALE));

        const half = pxAdj / 2;
        const r = half - 1;

        // IMPORTANT: no ${} anywhere
        const safeLetter = letter
          ? String(letter).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
          : "";

        const progKey = String(program || "").trim().toUpperCase();
        const textDy =
          (progKey === "SBN")
            ? "-0.10em"
            : "0em";

        const svg =
          '<svg xmlns="http://www.w3.org/2000/svg" width="' + pxAdj + '" height="' + pxAdj + '" viewBox="0 0 ' + pxAdj + ' ' + pxAdj + '">' +
            '<circle cx="' + half + '" cy="' + half + '" r="' + r + '" fill="' + fill + '" stroke="black" stroke-width="0.8"/>' +
            (ring ? '<circle cx="' + half + '" cy="' + half + '" r="' + (r + 1.5) + '" fill="none" stroke="#ffd400" stroke-width="2.6"/>' : '') +
            '<text x="50%" y="50%" dy="' + textDy + '" text-anchor="middle" dominant-baseline="central"' +
              ' font-family="Arial, sans-serif" font-weight="700" font-size="' + fontSize + '"' +
              ' letter-spacing="' + (isTwo ? '-0.2' : '0') + '"' +
              ' textLength="' + (isTwo ? Math.round(pxAdj * 0.92) : Math.round(pxAdj * 0.55)) + '"' +
              ' lengthAdjust="spacingAndGlyphs"' +
              ' fill="' + textFill + '" stroke="black" stroke-width="' + (isTwo ? '0.25' : '0.5') + '" paint-order="stroke">' +
              safeLetter +
            '</text>' +
          '</svg>';

        return {
          type: "picture-marker",
          url: "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg),
          width: pxAdj,
          height: pxAdj
        };
      }




      // Persist center/zoom & redraw symbols on zoom
      view.watch("center", () => {
        saveMapCenter(view.center);
      });


      /* =====================================================
      * Zoom smoothing patch:
      * - DO NOT call renderPoints() on every zoom tick (it clears the layer)
      * - Instead, only rescale symbols on existing graphics (throttled)
      * ===================================================== */

      // throttle state
      let _zoomSymRaf = 0;
      let _zoomSymTimer = 0;
      let _stationaryHandle = null;

      // Small cached symbol getter (uses the local symbolCache declared above)
      function getSymbolCachedZoom_(status, zoom, program, ring) {
        const st = normStatus(status);
        const iconScale = String(window.__uiIconScale ?? 1);
        const fontScale = String(window.__uiIconFontScale ?? 1);

        const key = st + "|" + zoom + "|" + String(program || "") + "|" + (ring ? 1 : 0) + "|" + iconScale + "|" + fontScale;
        const hit = symbolCache.get(key);
        if (hit) return hit;

        // use your global builder (already wired to UI sliders)
        const sym = window.getSymbol(status, zoom, program, ring);
        symbolCache.set(key, sym);
        return sym;
      }

      // Recompute symbols for existing graphics WITHOUT clearing the layer.
      // ✅ Batched + stationary + only when integer zoom changes (prevents “blink” on zoom)
      let __symUpdateToken = 0;
      let __lastZoomInt = null;

      function updateSymbolsOnlyBatched_() {
        if (!graphicsLayer || !graphicsLayer.graphics) return;

        // Only update when integer zoom changes (reduces churn drastically)
        const zInt = Math.round(view.zoom);
        if (__lastZoomInt === zInt) return;
        __lastZoomInt = zInt;

        const token = ++__symUpdateToken;

        // Snapshot graphics so the iterator isn’t affected mid-loop
        const gs = graphicsLayer.graphics.toArray ? graphicsLayer.graphics.toArray() : Array.from(graphicsLayer.graphics);
        const BATCH = 350;
        let i = 0;

        const step = () => {
          if (token !== __symUpdateToken) return; // cancelled by a newer zoom update
          const end = Math.min(i + BATCH, gs.length);

          for (; i < end; i++) {
            const g = gs[i];
            if (!g) continue;

            // IMPORTANT: your renderPoints() sets attributes: { p, _key }
            const attrs = g.attributes || {};
            const p = attrs.p || attrs; // fallback for safety

            const stRaw = getStatusValue_(p);
            const stEff = (p && p.isPatching && normStatus(stRaw) === "svcbu") ? "patching" : stRaw;

            // Same provider ring logic you use elsewhere
            const ring = !!p.svcbuIsProvider || !!p.backupTo || !!p.svcbuProvidedTo || !!p.backupOf;

            // Mirror ACU/DCP program override so badge letters stay correct
            const rawType = String(p.type || "").trim();
            const rawProg = String(p.program || p.PROGRAM || p.programType || "").trim();
            const kindU   = String(p.kind || p.KIND || "").trim().toUpperCase();

            const typeU = rawType.toUpperCase();
            const progU = rawProg.toUpperCase();

            const isAcu = (kindU === "ACU" || kindU === "AA" || typeU === "ACU" || typeU === "AA" || progU === "ACU" || progU === "AA");
            const isDcp = (kindU === "AD"  || kindU === "DCP" || typeU === "DCP" || typeU === "AD"  || progU === "DCP" || progU === "AD");

            const displayProg =
              isAcu ? "ACU" :
              isDcp ? "DCP" :
              (rawProg || String(p.pgma || p.PGMA || p.program || "").trim());

            const sym = getSymbolCachedZoom_(stEff, zoom, program, ring);
            if (sym) g.symbol = sym;
          }

          if (i < gs.length) {
            requestAnimationFrame(step);
          }
        };

        requestAnimationFrame(step);
      }

      // Debounced/throttled zoom handler: update symbols lightly, only when stationary
      function scheduleSymbolRefresh_() {
        try {
          if (_zoomSymRaf) cancelAnimationFrame(_zoomSymRaf);
          if (_zoomSymTimer) clearTimeout(_zoomSymTimer);
        } catch (_) {}

        _zoomSymRaf = requestAnimationFrame(() => {
          _zoomSymTimer = setTimeout(() => {
            // If the view is still moving, wait until it settles (prevents jank + blinking)
            try {
              if (!view.stationary) {
                if (_stationaryHandle) { _stationaryHandle.remove(); _stationaryHandle = null; }
                _stationaryHandle = view.watch("stationary", (s) => {
                  if (s) {
                    try { updateSymbolsOnlyBatched_(); } catch (_) {}
                    try { _stationaryHandle?.remove(); } catch (_) {}
                    _stationaryHandle = null;
                  }
                });
                return;
              }
            } catch (_) {}

            // already stationary → update now
            updateSymbolsOnlyBatched_();
          }, 120); // slightly wider debounce reduces thrash further
        });
      }

      // ✅ zoom watcher: persist zoom + schedule batched symbol refresh
      view.watch("zoom", () => {
        saveMapZoom(view.zoom);
        scheduleSymbolRefresh_();
      });



      view.when(() => {

        setLoadStatus("Loading points…");   // ✅ ADD
        renderProgramLegend();

        // --- Keep behavior aligned with Validation Map ---
        // Make absolutely sure we are not boxed in by a constraints.geometry
        try {
          if (view.constraints) {
            view.constraints.geometry = null;
            view.constraints.minZoom = 3;
            view.constraints.maxZoom = 23;
            view.constraints.snapToZoom = false;
            view.constraints.rotationEnabled = false;
          }
        } catch (e) {
          console.warn('Error normalizing view constraints:', e);
        }
        // --- end Validation Map alignment ---

        loadSidebarState();
        setupUI();
        wireWwaAndRadarToggles({ map, view });
        syncViewPadding();
        setTimeout(syncViewPadding, 275); // ✅ re-sync after CSS slide/paint settles
        window.addEventListener("resize", syncViewPadding, { passive: true });

        // ✅ Pause Timed Rotation when a site popup opens; resume when it closes (robust + auto-resume)
        try {
          if (!window._popupPauseInstalled) {
            window._popupPauseInstalled = true;

            // IMPORTANT: popup.features can remain populated after close in docked mode.
            // Use popup.viewModel.state as the source of truth.
            const popupIsOpen = () => {
              try {
                const st = String(view?.popup?.viewModel?.state || "").toLowerCase();

                // Treat ONLY these as open
                if (st === "opening" || st === "open") return true;

                // Treat these as closed (even if features still exists)
                if (st === "closing" || st === "closed" || st === "hidden") return false;

                // If state is unavailable, fall back to visible (last resort)
                const vis = !!view?.popup?.visible;
                return vis;
              } catch (_) {
                return false;
              }
            };



            // expose to pause/resume functions for polling
            window._popupIsOpenNow = popupIsOpen;

            // If popup is already open when we wire up, pause immediately
            if (popupIsOpen()) pauseTimedRotationForPopup();

            const maybeResume = () => {
              // small delay lets the popup finish its close animation/state settle
              setTimeout(() => {
                if (!popupIsOpen()) resumeTimedRotationForPopup();
              }, 150);
            };

            // 1) Watch popup state (most reliable)
            if (view.popup?.viewModel && typeof view.popup.viewModel.watch === "function") {
              view.popup.viewModel.watch("state", (state) => {
                const st = String(state || "").toLowerCase();

                if (st === "opening" || st === "open") {
                  pauseTimedRotationForPopup();
                  return;
                }

                if (st === "closing" || st === "closed" || st === "hidden") {
                  maybeResume();
                  return;
                }

                // unknown state: don’t force anything
              });

            }

            // 2) Also watch visible (covers some docked cases)
            view.popup?.watch?.("visible", (vis) => {
              if (vis) pauseTimedRotationForPopup();
              else maybeResume();
            });

            // 3) Safety net: click hitTest pauses when clicking a graphic
            view.on("click", (evt) => {
              const rotCb = document.getElementById("timedRotation");
              if (!rotCb?.checked) return;

              view.hitTest(evt)
                .then((hit) => {
                  const results = hit?.results || [];
                  if (results.length) pauseTimedRotationForPopup();
                  else maybeResume(); // click on map background closes popup in many configs
                })
                .catch(() => {});
            });
          }
        } catch (e) {
          console.warn("Popup pause/resume hook failed:", e);
        }
      });

function wireWwaAndRadarToggles({ map, view }) {
  // Compatibility sync only:
  // - Uses the REAL checkbox IDs in Index.html
  // - Uses layer ids set by the add-ons
  // - Does NOT fight the add-ons (it just syncs once + on change)

  const wwaCb   = document.getElementById("wwaToggle");
  const radarCb = document.getElementById("radarToggle");

  const findLayer = (idOrTitle) =>
    map?.allLayers?.find(l => l.id === idOrTitle || l.title === idOrTitle) || null;

  const getWwaLayer   = () => findLayer("wwaLayer") || findLayer("WWA");
  const getRadarLayer = () => findLayer("radarReflLayer") || findLayer("Radar Reflectivity");

  function apply() {
    const wwaLayer = getWwaLayer();
    const radarLayer = getRadarLayer();

    if (wwaLayer && wwaCb) wwaLayer.visible = !!wwaCb.checked;
    if (radarLayer && radarCb) radarLayer.visible = !!radarCb.checked;
  }

  // If layers aren’t present yet, wait a beat and try again
  function applySoon() {
    apply();
    if (!getWwaLayer() || !getRadarLayer()) {
      setTimeout(apply, 250);
      setTimeout(apply, 750);
    }
  }

  wwaCb?.addEventListener("change", applySoon);
  radarCb?.addEventListener("change", applySoon);

  // Initial sync
  view.when(applySoon);
}

  // Zoom toggle

      function getSymbol(status, zoom, program, ring) {
        const st = normStatus(status);
        const isDown = (st === "down" || st === "svcbu");
        const isDegraded = (st === "degraded");
        const isPatching = (st === "patching");

        // color priority: Down > Patching > Degraded > Up
        const fill = isDown ? "red" : (isPatching ? "#1e63ff" : (isDegraded ? "#ffd400" : "green"));

        // Text color: black on yellow, white otherwise
        const textFill = isDegraded ? "black" : "white";


        // keep your sizing logic
        // Down = largest, Degraded = slightly larger, others = normal
        const base =
          isDown      ? 5 :
          isDegraded  ? 4 :
                        3;

        const size = base + zoom * 0.6;
        const px = Math.max(8, Math.round(size * 2));

        const letter = programToLetter(program) || "";
        const isTwo = (String(letter || "").length >= 2);

        // Give 2-letter badges a tiny size bump so "Aa/Ad" doesn't collapse visually
        const pxAdj = isTwo ? (px + 4) : px;

        // ↓ Reduce point-icon font size with a single scale knob
        const ICON_FONT_SCALE = 0.82; // 1.0 = current size, lower = smaller (try 0.75–0.90)

        const fontSize = isTwo
          ? Math.max(6, Math.round(pxAdj * 0.44 * ICON_FONT_SCALE))
          : Math.max(6, Math.round(pxAdj * 0.50 * ICON_FONT_SCALE));


        const half = pxAdj / 2;
        const r = half - 1;

        // IMPORTANT: no ${} anywhere
        const safeLetter = letter
        ? String(letter).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
        : "";

      const svg =
        '<svg xmlns="http://www.w3.org/2000/svg" width="' + pxAdj + '" height="' + pxAdj + '" viewBox="0 0 ' + pxAdj + ' ' + pxAdj + '">' +

          '<circle cx="' + half + '" cy="' + half + '" r="' + r + '" fill="' + fill + '" stroke="black" stroke-width="0.8"/>' +
          (ring ? '<circle cx="' + half + '" cy="' + half + '" r="' + (r + 1.5) + '" fill="none" stroke="#ffd400" stroke-width="2.6"/>' : '') +
          '<text x="50%" y="50%" text-anchor="middle" dominant-baseline="central"' +
            ' font-family="Arial, sans-serif" font-weight="700" font-size="' + fontSize + '"' +
            ' letter-spacing="' + (isTwo ? '-0.2' : '0') + '"' +
            ' textLength="' + (isTwo ? Math.round(pxAdj * 0.92) : Math.round(pxAdj * 0.55)) + '"' +
            ' lengthAdjust="spacingAndGlyphs"' +
            ' fill="' + textFill + '" stroke="black" stroke-width="' + (isTwo ? '0.25' : '0.5') + '" paint-order="stroke">' +
            safeLetter +
          '</text>' +

        '</svg>';

        return {
          type: "picture-marker",
          url: "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg),
          width: pxAdj,
          height: pxAdj
        };
      }

            ? `
                ${p.outageStart ? `<div><b>Start:</b> ${escapeHtml_(formatPopupUtcFromAny_(p.outageStart))}</div>` : ``}
                ${p.outageSource ? `<div><b>Source:</b> ${p.outageSource}</div>` : ``}
                <div><b>Cause:</b> ${p.outageCause || '—'}</div>
              `
            : ``;

        let out = `<hr style="margin:6px 0;border:none;border-top:1px solid #bdbdbd;"><div><b>Status:</b> ${boldStatus(statusDisplay)}</div>${outageDetails}`;

        // --- RADAR site link ---
        // For NEXRAD sites, add a divider and link:
        // - Up sites: below Status
        // - Down/Degraded/Patching sites: below Cause
        if (isRadarPd) {
          const radarIdRaw = String(
            p.pidAdj || p.pid || p.PID || p.siteId || p.sid || p.SID || ""
          ).trim();

          if (radarIdRaw) {
            const radarIdLabel = radarIdRaw.toUpperCase();
            const radarUrl =
              "https://radar.weather.gov/station/" +
              encodeURIComponent(radarIdRaw.toLowerCase()) +
              "/standard";

            out += divider +
              '<div><b>RADAR Link:</b> <a href="' +
              radarUrl +
              '" target="_blank" rel="noopener">' +
              escapeHtml_(radarIdLabel) +
              '</a></div>';
          }
        }

        const linkHtml = (label, url) => {
          const lbl = String(label || "").trim();
          const u   = String(url   || "").trim();

          if (u) {
            return `<a href="${escapeHtml_(u)}" target="_blank" rel="noopener">${escapeHtml_(lbl || "Open")}</a>`;
          }

          return escapeHtml_(lbl);
        };

        const addSection = (rows) => {
          const items = rows.filter(Boolean);
          if (!items.length) return "";
          return `${divider}${items.join("")}`;
        };

        // --- ASOS extra fields (UPDATED) ---
        if (isAsosPd) {
          const lastOb = String(p.lastOb || "").trim();          // PIDS AX
          const ts     = String(p.timeSinceLastOb || "").trim(); // PIDS AY

          // BA/BB rich-text link fields from server
          const eText = String(p.lastObEText || "").trim();
          const eUrl  = String(p.lastObEUrl  || "").trim();
          const dText = String(p.lastObDText || "").trim();
          const dUrl  = String(p.lastObDUrl  || "").trim();

          const hasAsosDetails = !!(lastOb || ts || eText || eUrl || dText || dUrl);

          // ALWAYS insert a divider before the ASOS observation block
          // This ensures Status -> divider -> Last OB
          if (hasAsosDetails) {
            out += divider;
          }

          if (lastOb) out += `<div><b>Last OB:</b> ${escapeHtml_(formatPopupUtcFromAny_(lastOb))}</div>`;
          if (ts)     out += `<div><b>Time Since Last Ob:</b> ${escapeHtml_(ts)}</div>`;

          if (eText || eUrl || dText || dUrl) out += `<div style="height:6px;"></div>`;

          if (eText || eUrl) out += `<div><b>Last Ob E:</b> ${linkHtml(eText, eUrl)}</div>`;
          if (dText || dUrl) out += `<div><b>Last Ob D:</b> ${linkHtml(dText, dUrl)}</div>`;

          return out;
        }

        // --- NWR extra fields (NEW) ---
        if (isNwrPd) {
          const lastForecast = String(p.nwrLastForecast || "").trim();                   // BK
          const timeSinceLastForecast = String(p.nwrTimeSinceLastForecast || "").trim(); // BL
          const forecastLinkText = String(p.nwrForecastLinkText || "").trim();           // BS label
          const forecastLinkUrl  = String(p.nwrForecastLinkUrl  || "").trim();           // BS url

          const lastOb = String(p.nwrLastOb || "").trim();                               // BN
          const timeSinceLastOb = String(p.nwrTimeSinceLastOb || "").trim();             // BO
          const obLinkText = String(p.nwrObLinkText || "").trim();                       // BW label
          const obLinkUrl  = String(p.nwrObLinkUrl  || "").trim();                       // BW url

          const lastAlert = String(p.nwrLastAlert || "").trim();                         // BQ
          const alertLinkText = String(p.nwrAlertLinkText || "").trim();                 // BU label
          const alertLinkUrl  = String(p.nwrAlertLinkUrl  || "").trim();                 // BU url

          out += addSection([
            lastForecast ? `<div><b>Last Forecast:</b> ${escapeHtml_(lastForecast)}</div>` : "",
            timeSinceLastForecast ? `<div><b>Time Since Last Forecast:</b> ${escapeHtml_(timeSinceLastForecast)}</div>` : "",
            (forecastLinkText || forecastLinkUrl) ? `<div><b>Forecast Link:</b> ${linkHtml(forecastLinkText, forecastLinkUrl)}</div>` : ""
          ]);

          out += addSection([
            lastOb ? `<div><b>Last Ob:</b> ${escapeHtml_(lastOb)}</div>` : "",
            timeSinceLastOb ? `<div><b>Time Since Last Ob:</b> ${escapeHtml_(timeSinceLastOb)}</div>` : "",
            (obLinkText || obLinkUrl) ? `<div><b>Ob Link:</b> ${linkHtml(obLinkText, obLinkUrl)}</div>` : ""
          ]);

          out += addSection([
            lastAlert ? `<div><b>Last Alert:</b> ${escapeHtml_(lastAlert)}</div>` : "",
            (alertLinkText || alertLinkUrl) ? `<div><b>Alert Link:</b> ${linkHtml(alertLinkText, alertLinkUrl)}</div>` : ""
          ]);

          return out;
        }

        // --- UA extra fields (NEW) ---
        if (isUa) {
          // Prefer UA-specific keys if you used them server-side; fall back safely.
          const tsr = String(
            p.timeSinceLastReport ??
            p.timeSinceLastRpt ??
            p.uaTimeSinceLastReport ??
            p.uaTimeSinceLastRpt ??
            p.pidsAY ?? p.PIDS_AY ?? ""
          ).trim(); // PIDS AY

          const lr = String(
            p.lastReportUa ??
            p.lastReportUA ??
            p.lastReport ??
            p.uaLastReport ??
            p.pidsAW ?? p.PIDS_AW ?? ""
          ).trim(); // PIDS AW

          const uaSoundingsText = String(
            p.uaSoundingsText ??
            p.uaLinkText ??
            p.pidsAZ ?? p.PIDS_AZ ?? ""
          ).trim();

          const uaSoundingsUrl = String(
            p.uaSoundingsUrl ??
            p.uaLinkUrl ??
            ""
          ).trim();

          if (tsr) out += `<div><b>Time Since Last Report:</b> ${escapeHtml_(tsr)}</div>`;
          if (lr)  out += `<div><b>Last Report:</b> ${escapeHtml_(lr)}</div>`;

          if (uaSoundingsText || uaSoundingsUrl) {
            out += addSection([
              `<div><b>UA Soundings:</b> ${linkHtml(uaSoundingsText, uaSoundingsUrl)}</div>`
            ]);
          }
        }

        // --- BUOY details link + BuoyCam ---
        if (isBuoyPd) {
          const buoyIdRaw = String(
            p.pidAdj || p.pid || p.PID || p.siteId || p.sid || p.SID || ""
          ).trim();

          const hasBuoyCam =
            (p.hasBuoyCam === true) ||
            (String(p.hasBuoyCam ?? "").trim().toLowerCase() === "true");

          const buoyCamText = hasBuoyCam ? "Yes" : "No";

          if (buoyIdRaw) {
            const buoyIdLabel = buoyIdRaw.toUpperCase();
            const buoyUrl =
              "https://www.ndbc.noaa.gov/station_page.php?station=" +
              encodeURIComponent(buoyIdRaw);

            out += divider +
              '<div><a href="' +
              buoyUrl +
              '" target="_blank" rel="noopener">Buoy details: ' +
              escapeHtml_(buoyIdLabel) +
              '</a></div>' +
              '<div><b>Has BuoyCam:</b> ' + buoyCamText + '</div>';
          } else {
            out += divider +
              '<div><b>Has BuoyCam:</b> ' + buoyCamText + '</div>';
          }
        }

        return out;
      })()}



      ${(() => {
        // PIDS AV (backup target) can come through as any of these depending on your server mapping
        const target = String(
          p.backupTo || p.svcbuProvidedTo || p.backupOf || p.backup_target || ""
        ).trim();

        if (!target) return "";

        // This is the “comment” line you asked for
        return `<div><b>Comment:</b> Providing Backup to ${target}</div>`;
      })()}

      ${p.svcbuProvidedBy ? `<div><b>SVCBU Provided By:</b> ${p.svcbuProvidedBy}</div>` : ``}
      ${p.svcbuProvidedTo ? `<div><b>SVCBU Provided To:</b> ${p.svcbuProvidedTo}</div>` : ``}

            ${(() => {
        // ===============================
        // ✅ AWIPS(PD) patching block
        // Show for AWIPS sites even if NOT currently patching
        // Elapsed is calculated live in UTC when popup opens.
        // ===============================
        const pgma = String(p.pgma || p.PGMA || "").trim().toUpperCase().replace(/\s+/g, " ");
        const isAwipsPd = (pgma === "AWIPS (PD)" || pgma.replace(/\s+/g, "") === "AWIPS(PD)");
        if (!isAwipsPd) return "";

        const safeUtc = (v) => {
          const s = String(v ?? "").trim();
          return s ? escapeHtml_(formatPopupUtcFromAny_(s)) : "—";
        };

        const parseUtcMs = (v) => {
          const s = String(v ?? "").trim();
          if (!s) return null;

          // Already formatted like: Mon Mar 16 2026 19:52:00 UTC
          let m = s.match(/^(Sun|Mon|Tue|Wed|Thu|Fri|Sat)\s+(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s+(\d{1,2})\s+(\d{4})\s+(\d{2}):(\d{2}):(\d{2})\s+UTC$/i);
          if (m) {
            const MONTH_INDEX = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
            const mon = m[2].slice(0,1).toUpperCase() + m[2].slice(1,3).toLowerCase();
            return Date.UTC(
              Number(m[4]),
              MONTH_INDEX[mon],
              Number(m[3]),
              Number(m[5]),
              Number(m[6]),
              Number(m[7])
            );
          }

          // ISO-ish / sheet style: 2026-03-13 23:00:00 or 2026-03-13T23:00:00Z
          m = s.match(/^(\d{4})[-\/ ](\d{1,2})[-\/ ](\d{1,2})(?:[ T]+(\d{1,2}):(\d{2})(?::(\d{2}))?)?\s*(UTC|Z)?$/i);
          if (m) {
            return Date.UTC(
              Number(m[1]),
              Number(m[2]) - 1,
              Number(m[3]),
              Number(m[4] || 0),
              Number(m[5] || 0),
              Number(m[6] || 0)
            );
          }

          const t = Date.parse(s);
          return Number.isFinite(t) ? t : null;
        };

        const calcElapsed = (startVal, endVal) => {
          const startMs = parseUtcMs(startVal);
          if (startMs == null) return "—";

          const endMs = parseUtcMs(endVal);
          const stopMs = (endMs != null) ? endMs : Date.now();

          let diff = Math.max(0, stopMs - startMs);

          const totalSeconds = Math.floor(diff / 1000);
          const days = Math.floor(totalSeconds / 86400);
          const hours = Math.floor((totalSeconds % 86400) / 3600);
          const minutes = Math.floor((totalSeconds % 3600) / 60);
          const seconds = totalSeconds % 60;

          const pad2 = (n) => String(n).padStart(2, "0");

          if (days > 0) return `${days}d ${pad2(hours)}:${pad2(minutes)}:${pad2(seconds)}`;
          return `${pad2(hours)}:${pad2(minutes)}:${pad2(seconds)}`;
        };

        return `
          <div style="margin:6px 0;">---------------</div>
          <div style="font-weight:800; margin-bottom:2px;">Patching</div>

          <div style="height:6px;"></div>

          <div style="margin-top:4px; font-weight:800;">Security</div>
          <div><b>Start:</b> ${safeUtc(p.awipsSecurityStart)}</div>
          <div><b>End:</b> ${safeUtc(p.awipsSecurityEnd)}</div>
          <div><b>Elapsed:</b> ${escapeHtml_(calcElapsed(p.awipsSecurityStart, p.awipsSecurityEnd))}</div>

          <div style="height:6px;"></div>

          <div style="margin-top:4px; font-weight:800;">OpenShift</div>
          <div><b>Start:</b> ${safeUtc(p.awipsOpenshiftStart)}</div>
          <div><b>End:</b> ${safeUtc(p.awipsOpenshiftEnd)}</div>
          <div><b>Elapsed:</b> ${escapeHtml_(calcElapsed(p.awipsOpenshiftStart, p.awipsOpenshiftEnd))}</div>
        `;
      })()}
  `;


  html += `</div>`;
  return html;
}

// --- Popup header ID resolver ---
function getPopupHeaderId_(p, displayProgram) {
  const clean = (v) => String(v ?? "").trim();
  const up = (v) => clean(v).toUpperCase();

  // Program label (strip "(PD)" just in case)
  const prgm = up(displayProgram).replace(/\s*\(PD\)\s*/g, "").trim();

  // Prefer PID, fallback to SID
  let id = up(p?.pidAdj || p?.pid || p?.PID || p?.siteId || "");
  if (!id) id = up(p?.sid || p?.SID || "");

  // Safety: if both missing, at least show something
  if (!id && prgm) return prgm;
  if (!id && !prgm) return "Site";

  // TDWR SPG sanity (optional, keeps your prior intent)
  // If program is TDWR SPG and id looks like K###, force T###
  if (prgm === "TDWR SPG" && /^K[A-Z0-9]{3}$/.test(id)) {
    id = "T" + id.slice(1);
  }

  return prgm ? `${prgm} - ${id}` : id;
}

function renderPoints(points){
  const myToken = ++renderToken; // cancel stale renders

  currentFilteredFeatures = Array.isArray(points) ? points : [];
  window._currentFilteredFeatures = currentFilteredFeatures;

  const z = view.zoom;

  // ---- Layer swap (transparent refresh) ----
  // Render into a new layer, then swap it in so users never see a blank map.
  const oldLayer = window._pointsLayer || graphicsLayer;

  // ✅ IMPORTANT: cleanup any orphan temp layers from prior canceled renders
  try {
    window._tmpPointsLayers = window._tmpPointsLayers || new Set();
    for (const lyr of Array.from(window._tmpPointsLayers)) {
      if (lyr && lyr !== window._pointsLayer) {
        try { map.remove(lyr); } catch(_) {}
      }
    }
  } catch(_) {}

  // Create a uniquely-identified temp layer for THIS render
  const newLayer = new GraphicsLayer({ id: "pointsLayer_tmp_" + String(myToken) });
  map.add(newLayer);

  // Track temp layers so we can remove them if canceled
  try { window._tmpPointsLayers.add(newLayer); } catch(_) {}


  // Build a fresh index for the new layer
  const newIndex = new NativeMap();

  const rank = (st) => {
    const s = String(st || "").toLowerCase().trim();
    if (s === "down" || s === "svcbu") return 4;
    if (s === "degraded") return 3;
    if (s === "patching") return 2;
    return 1; // Up/unknown
  };

  // Split into outages first so they appear immediately
  const outages = [];
  const others = [];

  for (const f of currentFilteredFeatures) {
    const p = f?.properties || {};
    const st = getStatusValue_(p);
    const r = rank(st);
    if (r >= 2) outages.push(f); else others.push(f);
  }
  const ptsOutageFirst = outages.concat(others);

  setLoadStatus("Rendering points (" + String(ptsOutageFirst.length) + ")…");

  const bringOutagesToFront = (outageGraphics) => {
    try {
      for (const g of outageGraphics) {
        newLayer.reorder(g, newLayer.graphics.length - 1);
      }
    } catch(_) {}
  };

  const buildGraphic = (f) => {
    const coords = f?.geometry?.coordinates;
    if (!coords || coords.length < 2) return null;

    const lon = Number(coords[0]);
    const lat = Number(coords[1]);
    if (!Number.isFinite(lon) || !Number.isFinite(lat)) return null;

    const p = f?.properties || {};

    // Key used for index lookups; allow collisions (station vs overlays) safely by also including kind if present
    const baseKey = String(
      p.pidAdj || p.pid || p.PID || p.siteId || p.sidAdj || p.sid || p.SID || ""
    ).trim().toUpperCase();
    if (!baseKey) return null;

    const kindU = String(p.kind || p.KIND || "").trim().toUpperCase();
    const key = kindU ? (baseKey + "|" + kindU) : baseKey;

    // Yellow ring if providing backup (PIDS AV not null)
    const ring = !!p.svcbuIsProvider || !!p.backupTo || !!p.svcbuProvidedTo || !!p.backupOf;

    // Program used for both badge AND popup header:
    const rawType = String(p.type || "").trim();
    const rawProg = String(p.program || p.PROGRAM || p.programType || "").trim();

    const typeU = rawType.toUpperCase();
    const progU = rawProg.toUpperCase();

    const isAcu = (kindU === "ACU" || kindU === "AA" || typeU === "ACU" || typeU === "AA" || progU === "ACU" || progU === "AA");
    const isDcp = (kindU === "AD"  || kindU.startsWith("DCP") || typeU === "DCP" || typeU === "AD" || typeU.startsWith("DCP") || progU === "DCP" || progU === "AD" || progU.startsWith("DCP"));

    // BUOY(PD) and RADAR(PD) icon-letter handling
    const pgmaU = String(p.pgma || p.PGMA || "").trim().toUpperCase().replace(/\s+/g, " ");
    const pgmaCompact = pgmaU.replace(/\s+/g, "");
    const isBuoyPd = (pgmaU === "BUOY (PD)" || pgmaCompact === "BUOY(PD)");
    const isRadarPd = (pgmaU === "RADAR (PD)" || pgmaCompact === "RADAR(PD)");

    const buoySubtype = normalizeProgramForFilter(String(p.subtype || "").trim());
    const radarSubtype = normalizeProgramForFilter(String(p.subtype || "").trim());

    const buoyUseChildLabels = buoyChildSelectionActive_();
    const radarUseChildLabels = radarChildSelectionActive_();

    const programForLetter =
      isAcu ? "ACU" :
      isDcp ? "DCP" :
      (isBuoyPd
        ? (buoyUseChildLabels ? (buoySubtype || "BUOY") : "BUOY")
        : (isRadarPd
            ? (radarUseChildLabels ? (radarSubtype || "RADAR") : "RADAR")
            : (p.pgma || p.PGMA || rawProg || rawType || "")));

    const stRaw = getStatusValue_(p);
    const stEff = (p && p.isPatching && normStatus(stRaw) === "svcbu") ? "patching" : stRaw;
    const sym = window.getSymbolCached(stEff, z, programForLetter, ring);



    const displayProgram =
      isAcu ? "ACU" :
      isDcp ? "DCP" :
      normalizeProgramForFilter(programForLetter || rawType || rawProg || "");
    const headerId = getPopupHeaderId_(p, displayProgram);

    const popupTemplate = {
      title: headerId || "Site",
      content: buildPopupHtml(p)
    };

    return new Graphic({
      geometry: { type: "point", longitude: lon, latitude: lat },
      symbol: sym,
      attributes: { p, _key: key },
      popupTemplate
    });
  };

  // Render in batches so the UI paints and outages show immediately
  const BATCH = 400;
  let i = 0;
  let added = 0, skipped = 0;
  const outageGraphics = [];

  const step = () => {
    if (myToken !== renderToken) {
      // ✅ cancelled mid-render: remove the temp layer so points don't accumulate
      try { map.remove(newLayer); } catch(_) {}
      try { window._tmpPointsLayers?.delete?.(newLayer); } catch(_) {}
      return;
    }


    const end = Math.min(i + BATCH, ptsOutageFirst.length);

    for (; i < end; i++) {
      const f = ptsOutageFirst[i];
      const g = buildGraphic(f);
      if (!g) { skipped++; continue; }

      newLayer.add(g);

      const k = String(g.attributes?._key || "").trim().toUpperCase();
      if (k) {
        try { newIndex.set(k, g); } catch(_) {}
      }

      const st = normStatus(getStatusValue_(g.attributes));
      if (st === "down" || st === "svcbu" || st === "patching" || st === "degraded") {
        outageGraphics.push(g);
      }

      added++;
    }

    setLoadStatus("Rendering points (" + String(added) + "/" + String(ptsOutageFirst.length) + ")…");

    bringOutagesToFront(outageGraphics);

    if (i < ptsOutageFirst.length) {
      requestAnimationFrame(step);
      return;
    }

    dbg("renderPoints: added=" + String(added) + " skipped=" + String(skipped));

    // Swap layers atomically
    // ✅ Remove any other temp layers that might have survived from older canceled renders
    try {
      if (window._tmpPointsLayers) {
        for (const lyr of Array.from(window._tmpPointsLayers)) {
          if (lyr && lyr !== newLayer) { try { map.remove(lyr); } catch(_) {} }
        }
      }
      window._tmpPointsLayers = new Set([newLayer]);
    } catch(_) {}

    try { map.remove(oldLayer); } catch(_) {}
    window._pointsLayer = newLayer;


    // Replace the global index used elsewhere
    window._graphicIndex = newIndex;

    // Update breakdowns + tables after points exist
    try { updateTypeBreakdown(); } catch(e) {}
    try { updateDownCounter(); } catch(e) {}
    try { renderDownTable([]); } catch(e) {}

    // Mark base points rendered and run any deferred installs (overlays + ASOS overlays)
    window.__basePointsRendered = true;

    // Install any overlays that were persisted ON but deferred during initial load.
    // These now run sequentially in priority order:
    // RADAR -> WWA -> RFC -> WFO -> CWSU -> MCC -> REGION -> TIMEZONES
    try {
      drainOverlayInstallQueue_();
    } catch(_) {}

    // Apply ASOS overlays if they arrived while base was rendering
    try {
      if (window._pendingAsosOverlays && !window.__asosApplied) applyPendingAsosOverlays_();
    } catch(_) {}

    clearLoadStatus();
  };

  requestAnimationFrame(step);
}


// ✅ DROP-IN: replace your existing updateTypeBreakdown() block with this entire section
function updateTypeBreakdown() {
  const norm = (s) => String(s || "").trim().replace(/\s+/g, " ").toUpperCase();
  const stripPD = (s) => String(s || "").replace(/\s*\(PD\)\s*/i, "").trim();

  // Normalize to display buckets we want to COUNT (leaf buckets)
  const DISPLAY_MAP = new Map([
    ["DATA BUOY", "BUOY"], ["BUOY", "BUOY"],
    ["DART BUOY", "DART"], ["DART", "DART"],
    ["CMAN", "OTHER"], ["C MAN", "OTHER"], ["C-MAN", "OTHER"], ["OTHER", "OTHER"],
    ["FIXED","OTHER"], ["OILRIG","OTHER"], ["USV","OTHER"],
    ["WSR-88D", "WSR88D"], ["WSR88D", "WSR88D"],
    ["TDWR", "TDWR SPG"], ["TDWR SPG", "TDWR SPG"],
    ["VWP", "VWP"],

    ["FACILITIES", "FACILITIES"],
    ["NWR", "NWR"],
    ["UA", "UA"],
    ["UPPER AIR", "UA"],

    ["AWIPS", "AWIPS"],      // base AWIPS (PD)
    ["SBN", "SBN"],

    // ASOS handled specially below (station vs ACU/DCP)
    ["ASOS", "ASOS"]
  ]);

  const toLeaf = (name) => {
    const cleaned = stripPD(name);
    const k = norm(cleaned);
    return DISPLAY_MAP.get(k) || cleaned || "Unknown";
  };

  const isOutage = (status) => isOutageStatus_(status);

  // Leaf buckets only (parents are computed rollups)
  const LEAVES_IN_ORDER = [
    // ASOS leaves
    "ASOS STATION", "ACU", "DCP", "DOW",
    // AWIPS leaves
    "AWIPS", "SBN",
    // BUOYS leaves
    "BUOY", "DART", "TAO", "OTHER",
    // singles
    "FACILITIES", "NWR",
    // RADAR leaves
    "TDWR SPG", "VWP", "WSR88D",
    // UA
    "UA"
  ];

  // Parent hierarchy (display order)
  const PARENTS = [
    { label: "ASOS", children: ["ASOS STATION", "ACU", "DCP", "DOW"] },
    { label: "AWIPS", children: ["AWIPS", "SBN"] },
    { label: "BUOYS", children: ["BUOY", "DART", "TAO", "OTHER"] },
    { label: "FACILITIES", children: [] },
    { label: "NWR", children: [] },
    { label: "RADAR", children: ["TDWR SPG", "VWP", "WSR88D"] },
    { label: "UA", children: [] }
  ];


  const totals = Object.create(null);
  const downs  = Object.create(null);
  for (const k of LEAVES_IN_ORDER) { totals[k] = 0; downs[k] = 0; }

  // Dedup keying: keep your current approach (PID/SID primary),
  // plus special handling for DCP overlays (can be multiple per station)
  const seen = new Set();

  const inc = (bucket, uniqueKey, out) => {
    if (!bucket || !uniqueKey) return;
    if (isExcludedProgram(bucket)) return;

    const k = `${bucket}|${uniqueKey}`;
    if (seen.has(k)) return;
    seen.add(k);

    totals[bucket] = (totals[bucket] || 0) + 1;
    if (out) downs[bucket] = (downs[bucket] || 0) + 1;
  };

  // ✅ Status Totals should ignore Show-Only-Down, but respect all other filters/program view
  const all =
    Array.isArray(window._statusTotalsFeatures) ? window._statusTotalsFeatures :
    (Array.isArray(currentFilteredFeatures) ? currentFilteredFeatures : []);


  for (const f of all) {
    const p = f?.properties || {};
    const out = isOutage(getStatusValue_(p));

    const pid = String(p.pid || p.siteId || "").trim().toUpperCase();
    const sid = String(p.sid || "").trim().toUpperCase();
    const id  = pid || sid;
    if (!id) continue;

    const pgmaVal = String(p.pgma || p.PGMA || "").trim().toUpperCase();
    const pgmaKey = pgmaVal.replace(/\s+/g, ""); // "ASOS (PD)" -> "ASOS(PD)"
    const kindVal = String(p.kind || p.KIND || "").trim().toUpperCase();
    const typeVal = String(p.type || p.programType || p.program || "").trim().toUpperCase();
    const subtype = String(p.subtype || "").trim().toUpperCase();

    // -------------------------
    // ASOS(PD): station vs overlays
    // -------------------------
    if (pgmaKey === "ASOS(PD)") {
      const isAcu = (kindVal === "ACU" || typeVal === "ACU");
      const isDcp = (kindVal.startsWith("DCP") || typeVal === "DCP");
      const pgmaGroup = String(p.pgmaGroup || "").trim().toUpperCase();
      const isDoW = (pgmaGroup === "DOD/USN");

      if (isAcu) {
        inc("ACU", id, out);
        continue;
      }

      if (isDcp) {
        const coords = f?.geometry?.coordinates || [];
        const lon = Number(coords[0]), lat = Number(coords[1]);
        const dcpKey = `${id}|${kindVal || "DCP"}|${Number.isFinite(lat) ? lat.toFixed(6) : "?"}|${Number.isFinite(lon) ? lon.toFixed(6) : "?"}`;
        inc("DCP", dcpKey, out);
        continue;
      }

      // base ASOS station point vs DoW subset
      inc(isDoW ? "DOW" : "ASOS STATION", id, out);
      continue;
    }

    // -------------------------
    // RADAR(PD): leaf by subtype bucket
    // -------------------------
    if (pgmaKey === "RADAR(PD)") {
      const leaf = toLeaf(subtype || "RADAR");
      // Only count the radar leaves we care about
      if (leaf === "WSR88D" || leaf === "TDWR SPG" || leaf === "VWP") {
        inc(leaf, id, out);
      }
      continue;
    }

    // -------------------------
    // Skip overlays (except ASOS handled above)
    // -------------------------
    if (kindVal) continue;

    // -------------------------
    // AWIPS base is AWIPS(PD); SBN is its own program rows
    // -------------------------
    if (pgmaKey === "AWIPS(PD)") {
      inc("AWIPS", id, out);
      continue;
    }

    // NWR base is NWR(PD)
    if (pgmaKey === "NWR(PD)") {
      inc("NWR", id, out);
      continue;
    }

    // Otherwise leaf comes from type/program/pgma
    // (covers FACILITIES, UA, SBN, BUOY/C-MAN/DART/TAO, etc)
    const leaf = toLeaf(typeVal || pgmaVal);
    if (!leaf) continue;

    // Normalize BUOYS children that might appear in PGMA
    // (your data may have them in PGMA rather than TYPE)
    const leafNorm = normalizeProgramForFilter(leaf);

    // Keep only leaves we track (prevents odd categories from polluting totals)
    const finalLeaf =
      (leafNorm === "BUOY" || leafNorm === "DART" || leafNorm === "TAO" || leafNorm === "OTHER") ? leafNorm :
      (leafNorm === "UA") ? "UA" :
      (leafNorm === "SBN") ? "SBN" :
      (leafNorm === "FACILITIES") ? "FACILITIES" :
      leaf;

    if (totals[finalLeaf] === undefined) continue;
    inc(finalLeaf, id, out);
  }

  // ---- Rollups (parents) ----
  const rollup = (keys) => keys.reduce((sum, k) => sum + (totals[k] || 0), 0);
  const rollupDown = (keys) => keys.reduce((sum, k) => sum + (downs[k] || 0), 0);

  const pct = (up, total) => total ? (up / total) * 100 : 100;

  const row = (label, total, down, indent = false, cls = "") => {
    const up = Math.max((total || 0) - (down || 0), 0);
    return `
      <tr class="${cls}">
        <td class="prog${indent ? " indent" : ""}">${label}</td>
        <td class="num">${total || 0}</td>
        <td class="num">${up}</td>
        <td class="num">${down || 0}</td>
        <td class="num">${pct(up, total || 0).toFixed(1)}%</td>
      </tr>
    `;
  };

  let body = "";

  for (const parent of PARENTS) {
    // Parent with children rollup
    if (parent.children && parent.children.length) {
      const t = rollup(parent.children);
      const d = rollupDown(parent.children);

      if (t || d) {
        body += row(parent.label, t, d, false, "sid-section");

        for (const c of parent.children) {
          const ct = totals[c] || 0;
          const cd = downs[c] || 0;
          if (!ct && !cd) continue;

          // nicer label for ASOS station / AWIPS base
          const label =
            (c === "ASOS STATION") ? "ASOS" :
            (c === "AWIPS") ? "AWIPS" :
            c;

          body += row(label, ct, cd, true);
        }
      }
      continue;
    }

    // Single-level parent (no children)
    const t = totals[parent.label] || 0;
    const d = downs[parent.label] || 0;

    const isBoldParent = (parent.label === "FACILITIES" || parent.label === "NWR" || parent.label === "UA");
    if (t || d) body += row(parent.label, t, d, false, isBoldParent ? "sid-parent" : "");

  }

  // ---- Grand totals (sum leaves only; never count parents) ----
  let grandTotal = 0, grandDown = 0;
  for (const k of LEAVES_IN_ORDER) {
    grandTotal += totals[k] || 0;
    grandDown  += downs[k] || 0;
  }
  const grandUp = Math.max(grandTotal - grandDown, 0);

  const html = `
    <div class="sid-counter-title">Status Totals</div>
    <table class="program-stats compact">
      <thead>
        <tr>
          <th class="left">Program</th>
          <th>Total</th>
          <th>Up</th>
          <th>Down</th>
          <th>%</th>
        </tr>
      </thead>
      <tbody>
        ${body || `<tr><td colspan="5">None</td></tr>`}
        <tr class="totals">
          <td class="prog"><b>Total</b></td>
          <td class="num"><b>${grandTotal}</b></td>
          <td class="num"><b>${grandUp}</b></td>
          <td class="num"><b>${grandDown}</b></td>
          <td class="num"><b>${pct(grandUp, grandTotal).toFixed(1)}%</b></td>
        </tr>
      </tbody>
    </table>
  `;

  const container = document.getElementById("typeBreakdown");
  if (container) container.innerHTML = html;
}

/* ===========================
 * Timed Rotation (optional Down-only + optional Zoom focus)
 * - Rotates across selected parent programs
 * - Does NOT change checkbox selections; applyFilters() uses an override
 * - Zoom only happens if Zoom Map to Feature is checked
 * - Down-only only happens if Show only Down/Degraded is checked
 * - NEW: If "Auto Expand" is checked under Down Sites, rotation will auto-expand
 *        the matching program group and collapse the others (and restore on stop).
 * =========================== */

const ROTATION_ALLOWED_PARENTS = ["ASOS","AWIPS","BUOYS","FACILITIES","NWR","RADAR","UA"];

// Must match your program tree groups (parents + children)
const ROTATION_GROUPS = {
  "ASOS":       ["ACU","DCP","DOW"],
  "AWIPS":      ["SBN"],
  "BUOYS":      ["OTHER","DART","TAO","BUOY"],  // BUOY appears in data; safe
  "FACILITIES": [],
  "NWR":        [],
  "RADAR":      ["TDWR SPG","VWP","WSR88D"],
  "UA":         []
};

let _rotationTimer = null;  // timeout handle
let _rotationIndex = 0;

const ROTATION_LAST_PARENT_KEY = "rotationLastParent";

// the current parent program being shown (read by applyFilters override)
window._rotationParentProgram = "";

/* ===========================
 * Down Sites Auto-Expand helpers (required for rotation)
 * - Uses the same localStorage keys renderDownTable() already uses:
 *     downProgExpanded_<PARENT>
 * - Snapshot/restore so user’s expand/collapse state returns after rotation stops.
 * =========================== */

let _downAutoExpandSnapshot_ = null;

function _downAutoExpandEnabled_(){
  // checkbox in Index.html: id="downAutoExpand"
  return !!document.getElementById("downAutoExpand")?.checked;
}

function _downAutoExpandBegin_(){
  // Take snapshot once per rotation run
  if (_downAutoExpandSnapshot_) return;

  const snap = {};
  for (const parent of (Array.isArray(ROTATION_ALLOWED_PARENTS) ? ROTATION_ALLOWED_PARENTS : [])) {
    const key = `downProgExpanded_${parent}`;
    const v = localStorage.getItem(key);
    // default (your renderDownTable defaults to true)
    snap[key] = (v === null) ? "true" : v;
  }
  _downAutoExpandSnapshot_ = snap;
}

function _downAutoExpandToParent_(parent){
  const p = String(parent || "").trim().toUpperCase();
  if (!p) return;

  // Ensure we have a snapshot so we can restore later
  _downAutoExpandBegin_();

  // Expand only the active parent, collapse the rest
  for (const x of (Array.isArray(ROTATION_ALLOWED_PARENTS) ? ROTATION_ALLOWED_PARENTS : [])) {
    const key = `downProgExpanded_${x}`;
    localStorage.setItem(key, (x === p) ? "true" : "false");
  }

  // Re-render Down table so chevrons + rows update immediately
  try { renderDownTable(); } catch(_) {}
}

function _downAutoExpandEnd_(){
  if (!_downAutoExpandSnapshot_) return;

  // Restore saved user states
  for (const [k, v] of Object.entries(_downAutoExpandSnapshot_)) {
    try { localStorage.setItem(k, String(v)); } catch(_) {}
  }
  _downAutoExpandSnapshot_ = null;

  // Re-render Down table to reflect restored state
  try { renderDownTable(); } catch(_) {}
}

function saveRotationLastParent_(){
  try {
    const v = String(window._rotationParentProgram || "").trim().toUpperCase();
    if (v) localStorage.setItem(ROTATION_LAST_PARENT_KEY, v);
    else localStorage.removeItem(ROTATION_LAST_PARENT_KEY);
  } catch (_) {}
}

function loadRotationLastParent_(){
  try {
    return String(localStorage.getItem(ROTATION_LAST_PARENT_KEY) || "").trim().toUpperCase();
  } catch (_) {
    return "";
  }
}

function clearRotationLastParent_(){
  try { localStorage.removeItem(ROTATION_LAST_PARENT_KEY); } catch (_) {}
}

// ---- Rotation interval from UI (Pause seconds input) ----
function _getRotationIntervalMs_(){
  const el = document.getElementById("rotationPauseSeconds");
  const n = Number(el?.value);
  const sec = (Number.isFinite(n) && n > 0) ? n : 5;
  return Math.round(sec * 1000);
}

function _uiSelectedProgramsSet_(){
  return new Set(
    Array.from(document.querySelectorAll(".programCheckbox:checked"))
      .map(cb => normalizeProgramForFilter(cb.value))
      .filter(Boolean)
  );
}

function _rotationProgramsForParent_(parent, uiSelectedPrograms){
  const p = String(parent || "").trim().toUpperCase();
  const ui = (uiSelectedPrograms instanceof Set) ? uiSelectedPrograms : _uiSelectedProgramsSet_();

  const children = Array.isArray(ROTATION_GROUPS[p]) ? ROTATION_GROUPS[p].slice() : [];
  const parentChecked = ui.has(p);
  const checkedChildren = children.filter(ch => ui.has(ch));

  // Parent checked, no child checked:
  // rotate/show only the parent program itself
  if (parentChecked && !checkedChildren.length) {
    return new Set([p]);
  }

  // Child-only selection:
  // rotate/show only the selected child programs
  if (!parentChecked && checkedChildren.length) {
    return new Set(checkedChildren);
  }

  // Parent + one or more children checked:
  // show exactly what user checked in that family
  if (parentChecked && checkedChildren.length) {
    return new Set([p, ...checkedChildren]);
  }

  // Fallback for single programs with no children
  if (!children.length && parentChecked) {
    return new Set([p]);
  }

  return new Set();
}

function _buildRotationListFromUI_(){
  const ui = _uiSelectedProgramsSet_();

  const hasAsosFamily  = ui.has("ASOS") || ui.has("ACU") || ui.has("DCP") || ui.has("DOW");
  const hasAwipsFamily = ui.has("AWIPS") || ui.has("SBN");
  const hasBuoysFamily = ui.has("BUOYS") || ui.has("BUOY") || ui.has("OTHER") || ui.has("DART") || ui.has("TAO");
  const hasRadarFamily = ui.has("RADAR") || ui.has("WSR88D") || ui.has("TDWR SPG") || ui.has("VWP");

  const list = [];
  if (hasAsosFamily)  list.push("ASOS");
  if (hasAwipsFamily) list.push("AWIPS");
  if (hasBuoysFamily) list.push("BUOYS");
  if (ui.has("FACILITIES")) list.push("FACILITIES");
  if (ui.has("NWR"))        list.push("NWR");
  if (hasRadarFamily)       list.push("RADAR");
  if (ui.has("UA"))         list.push("UA");

  return list.length ? list : ROTATION_ALLOWED_PARENTS.slice();
}

function _programDrawPriority_(bucket){
  const b = String(bucket || "").trim().toUpperCase();

  // child first, parent last so parent stays on top
  if (b === "ACU" || b === "DCP" || b === "DOW") return 10;
  if (b === "ASOS") return 19;

  if (b === "SBN") return 20;
  if (b === "AWIPS") return 29;

  if (b === "BUOY" || b === "DART" || b === "TAO" || b === "OTHER") return 30;
  if (b === "BUOYS") return 39;

  if (b === "TDWR SPG" || b === "VWP" || b === "WSR88D") return 40;
  if (b === "RADAR") return 49;

  if (b === "FACILITIES") return 60;
  if (b === "NWR") return 70;
  if (b === "UA") return 80;

  return 999;
}



function stopTimedRotation(){
  if (_rotationTimer) clearTimeout(_rotationTimer);
  _rotationTimer = null;

  if (window._popupResumePoll) {
    clearInterval(window._popupResumePoll);
    window._popupResumePoll = null;
  }

  _rotationIndex = 0;
  window._rotationParentProgram = "";
  window._rotationPausedByPopup = false;

  if (_downAutoExpandEnabled_()) _downAutoExpandEnd_();
}


/* --- Pause rotation while a popup is open --- */
function pauseTimedRotationForPopup(){
  const rotCb = document.getElementById("timedRotation");
  if (!rotCb?.checked) return;                 // rotation not enabled
  if (window._rotationPausedByPopup) return;   // already paused

  if (_rotationTimer) clearTimeout(_rotationTimer);
  _rotationTimer = null;
  window._rotationPausedByPopup = true;

  // ✅ Auto-resume poll: some popup close paths do not fire watchers consistently
  if (window._popupResumePoll) clearInterval(window._popupResumePoll);

  window._popupResumePoll = setInterval(() => {
    try {
      // if user turned rotation off, stop polling
      const cb = document.getElementById("timedRotation");
      if (!cb?.checked) {
        clearInterval(window._popupResumePoll);
        window._popupResumePoll = null;
        return;
      }

      // if we've already resumed, stop polling
      if (!window._rotationPausedByPopup) {
        clearInterval(window._popupResumePoll);
        window._popupResumePoll = null;
        return;
      }

      const isOpen = (typeof window._popupIsOpenNow === "function") ? window._popupIsOpenNow() : false;
      if (!isOpen) {
        clearInterval(window._popupResumePoll);
        window._popupResumePoll = null;
        resumeTimedRotationForPopup(); // will schedule the next tick
      }
    } catch (_) {}
  }, 300); // fast enough to feel instant, light enough to be safe
}


function resumeTimedRotationForPopup(){
  const rotCb = document.getElementById("timedRotation");
  if (!rotCb?.checked) return;                 // user turned it off
  if (!window._rotationPausedByPopup) return;  // not paused by popup

  // stop polling
  if (window._popupResumePoll) {
    clearInterval(window._popupResumePoll);
    window._popupResumePoll = null;
  }

    // ✅ If popup is still open (content actually present), do nothing.
  // Use our popupIsOpenNow() logic instead of container box checks (those can lie in docked mode).
  try {
    const isOpen = (typeof window._popupIsOpenNow === "function") ? window._popupIsOpenNow() : false;
    if (isOpen) return;
  } catch (_) {}


  window._rotationPausedByPopup = false;

  // ✅ Ensure timer restarts even if something previously nulled it
  if (_rotationTimer) clearTimeout(_rotationTimer);
  _rotationTimer = setTimeout(_rotationTick_, _getRotationIntervalMs_());
}




function _rotationTick_(){
  const rotCb = document.getElementById("timedRotation");
  if (!rotCb?.checked) return;

  // ✅ If a popup opened and paused rotation, do NOT advance or reschedule
  if (window._rotationPausedByPopup) {
    _rotationTimer = null;
    return;
  }


  let list = _buildRotationListFromUI_();
  if (!list.length) {
    stopTimedRotation();
    applyFilters();
    return;
  }

  _rotationIndex = (_rotationIndex + 1) % list.length;
  window._rotationParentProgram = list[_rotationIndex];
  saveRotationLastParent_();

  applyFilters();

  // Auto expand Down Sites group to match current rotation parent
  if (_downAutoExpandEnabled_()) {
    _downAutoExpandBegin_();
    _downAutoExpandToParent_(window._rotationParentProgram);
  }

    if (!window._rotationPausedByPopup) {
    _rotationTimer = setTimeout(_rotationTick_, _getRotationIntervalMs_());
  } else {
    _rotationTimer = null;
  }

}

function startTimedRotation(){
  stopTimedRotation();
  window._rotationPausedByPopup = false;

  let list = _buildRotationListFromUI_();

  if (!list.length) {
    window._rotationParentProgram = "";
    clearRotationLastParent_();
    applyFilters();
    return;
  }

  const savedParent = loadRotationLastParent_();
  const savedIdx = savedParent ? list.indexOf(savedParent) : -1;

  if (savedIdx >= 0) {
    _rotationIndex = savedIdx;
  } else {
    _rotationIndex = 0;
  }

  window._rotationParentProgram = list[_rotationIndex];
  saveRotationLastParent_();
  applyFilters();

  // Auto expand immediately for the first program (if enabled)
  if (_downAutoExpandEnabled_()) {
    _downAutoExpandBegin_();
    _downAutoExpandToParent_(window._rotationParentProgram);
  }

  _rotationTimer = setTimeout(_rotationTick_, _getRotationIntervalMs_());
}

function ensureTimedRotationStartup_(){
  const rotCb = document.getElementById("timedRotation");

  // If rotation is not enabled, make sure we do not carry a stale parent program
  if (!rotCb?.checked) {
    if (!_rotationTimer) {
      window._rotationParentProgram = "";
    }
    return;
  }

  // Already running
  if (_rotationTimer) return;

  // Do not interfere with popup-pause logic
  if (window._rotationPausedByPopup) return;

  // Delay one tick so restored filters/points/render complete first
  setTimeout(() => {
    try {
      const cb = document.getElementById("timedRotation");
      if (!cb?.checked) return;
      if (_rotationTimer) return;
      if (window._rotationPausedByPopup) return;

      startTimedRotation();
    } catch (e) {
      console.warn("ensureTimedRotationStartup_ failed:", e);
    }
  }, 0);
}

function installTimedRotationUI(){
  // ✅ Prevent duplicate global listeners if setupUI() ever runs again
  if (window._timedRotationUIInstalled) return;
  window._timedRotationUIInstalled = true;

  const rotCb = document.getElementById("timedRotation");
  if (!rotCb) return;

  rotCb.addEventListener("change", () => {
    saveFiltersToStorage();

    if (rotCb.checked) {
      startTimedRotation();
    } else {
      stopTimedRotation();
      window._rotationParentProgram = "";
      clearRotationLastParent_();
      applyFilters();
    }
  });

  // While rotation is ON:
  // - If programs change, restart rotation (so the list updates immediately)
  // - If showDownOnly or zoomOnFilter change, just re-apply filters
  // - If pause seconds changes, restart rotation so timing applies immediately
  document.addEventListener("change", (e) => {
    if (!rotCb.checked) return;

    if (e.target?.classList?.contains("programCheckbox")) {
      startTimedRotation();
      return;
    }

    if (e.target?.id === "rotationPauseSeconds") {
      saveFiltersToStorage();
      startTimedRotation();
      return;
    }

    if (e.target?.id === "showDownOnly" || e.target?.id === "zoomOnFilter") {
      applyFilters();
      return;
    }
  });
}




      

      /* ===== Filters ===== */
function applyFilters(){
  // Expose to global scope so overlay/background passes (outside ArcGIS require scope) can re-filter safely.
  window.applyFilters = applyFilters;

  dbg("applyFilters(): total features =", (features||[]).length);


  const get = (id) => (document.getElementById(id)?.value || "").toString().trim();
  const f_pid   = get("f_pid").toLowerCase();
  const f_sid   = get("f_sid").toLowerCase();
  const f_wfo   = get("f_wfo").toLowerCase();
  const f_city  = get("f_city").toLowerCase();
  const f_state = get("f_state").toLowerCase();
  const f_any   = get("f_any").toLowerCase();

  // Regions selected in UI
  const regions = new Set(
    Array.from(document.querySelectorAll(".regionCheckbox:checked"))
      .map(c => String(c.value || "").trim().toUpperCase())
      .filter(Boolean)
  );

  // Office Types selected in UI
  const officeTypes = new Set(
    Array.from(document.querySelectorAll(".officeTypeCheckbox:checked"))
      .map(c => String(c.value || "").trim().toUpperCase())
      .filter(Boolean)
  );

  // Programs selected in UI
  const uiSelectedPrograms = new Set(
    Array.from(document.querySelectorAll(".programCheckbox:checked"))
      .map(c => normalizeProgramForFilter(c.value))
      .filter(Boolean)
  );

  // Timed Rotation override: constrain program filtering WITHOUT changing checkboxes
  const rotCb = document.getElementById("timedRotation");
  const rotOn = !!rotCb?.checked;
  const rotParent = String(window._rotationParentProgram || "").trim().toUpperCase();

  let selectedPrograms = uiSelectedPrograms;
  if (rotOn && rotParent) {
    const constrained = _rotationProgramsForParent_(rotParent, uiSelectedPrograms);

    // During timed rotation, if nothing in the active family is explicitly checked,
    // still rotate that parent family instead of showing all programs.
    if (constrained.size > 0) {
      selectedPrograms = constrained;
    } else {
      selectedPrograms = new Set([rotParent]);
    }
  }


  const zoomFocus = !!document.getElementById("zoomOnFilter")?.checked;
  const downOnly  = !!document.getElementById("showDownOnly")?.checked;
  const hideOutages = !!document.getElementById("hideDownDegraded")?.checked;


  // Region normalization (supports full names + SR/CR/ER/etc.)
  const REGION_CODE_TO_NAME = {
    "SR": "SOUTHERN REGION",
    "CR": "CENTRAL REGION",
    "ER": "EASTERN REGION",
    "WR": "WESTERN REGION",
    "PR": "PACIFIC REGION",
    "AR": "ALASKA REGION"
  };
  const normRegion = (v) => {
    const s = String(v || "").trim().toUpperCase();
    if (!s) return "";
    return REGION_CODE_TO_NAME[s] || s;
  };

  // Decide a filter-bucket program for each feature
  // (ASOS station vs ACU/DCP; RADAR subtype; otherwise type/pgma/program/kind)
  const programBucket = (p) => {
    const pgmaRaw = String(p.pgma ?? p.PGMA ?? "").trim().toUpperCase();
    const pgmaKey = pgmaRaw.replace(/\s+/g, "");
    const kindVal = String(p.kind ?? p.KIND ?? "").trim().toUpperCase();
    const typeVal = String(p.type ?? p.programType ?? p.program ?? "").trim().toUpperCase();
    const subtype = String(p.subtype ?? "").trim().toUpperCase();
    const pgmaGroup = String(p.pgmaGroup ?? "").trim().toUpperCase();

    // ASOS(PD): base station vs ACU/DCP overlays vs DoW subset
    if (pgmaKey === "ASOS(PD)") {
      const isAcu = (kindVal === "ACU" || kindVal === "AA" || typeVal === "ACU");
      const isDcp = (kindVal.startsWith("DCP") || kindVal === "DCP" || kindVal === "AD" || typeVal === "DCP");
      const isDoW = (pgmaGroup === "DOD/USN");

      if (isAcu) return "ACU";
      if (isDcp) return "DCP";
      if (isDoW) return "DOW";
      return "ASOS";
    }

    // RADAR: bucket by subtype (TDWR SPG / VWP / WSR88D)
    if (pgmaKey === "RADAR(PD)") {
      return normalizeProgramForFilter(subtype || "RADAR");
    }

    // Overlays (kind): ACU/DCP already handled above; keep others as their kind if present
    if (kindVal) return normalizeProgramForFilter(kindVal);

    // ✅ BUOY (PD): bucket by subtype (BUOY/DART/TAO/OTHER)
    if (pgmaKey === "BUOY(PD)") {
      const s = normalizeProgramForFilter(subtype || "BUOY");
      if (s === "DART" || s === "TAO" || s === "BUOY") return s;
      return "OTHER";
    }

    // AWIPS/NWR/FAC/UA/BUOYS/SBN/etc.
    const base = typeVal || pgmaRaw || "";
    return normalizeProgramForFilter(base);
  };

  // Helpers for matching
  const matchesText = (p) => {
    const pid = String(p.pidAdj || p.pid || p.PID || p.siteId || "").trim();
    const sid = String(p.sidAdj || p.sid || p.SID || "").trim();
    const wfo = String(p.office || p.WFO || "").trim();
    const city = String(p.city || p.CITY || "").trim();
    const state = String(p.state || p.STATE || "").trim();

    const stnName = String(
      p.STN_NAME ?? p.searchableName ?? p.stn_name ?? p.stnName ?? p.name ?? ""
    ).trim();

    // Field-specific
    if (f_pid && !pid.toLowerCase().includes(f_pid)) return false;
    if (f_sid && !sid.toLowerCase().includes(f_sid)) return false;
    if (f_wfo && !wfo.toLowerCase().includes(f_wfo)) return false;
    if (f_city && !city.toLowerCase().includes(f_city)) return false;
    if (f_state && !state.toLowerCase().includes(f_state)) return false;

    // Any-field
    if (f_any) {
      const blob = [
        pid, sid, wfo, city, state, stnName,
        String(p.pgma ?? p.PGMA ?? ""),
        String(p.type ?? p.programType ?? p.program ?? ""),
        String(p.subtype ?? ""),
        String(p.region ?? p.REGION ?? "")
      ].join(" ").toLowerCase();
      if (!blob.includes(f_any)) return false;
    }

    return true;
  };

  const matchesRegion = (p) => {
    if (!regions.size) return true;
    const r = normRegion(p.region || p.REGION || "");
    return regions.has(String(r).toUpperCase());
  };

  const matchesOfficeType = (p) => {
    if (!officeTypes.size) return true;

    // try common keys; fall back to STN_DETAIL; do NOT use office code (ABQ/etc.)
    const ot =
      String(
        p.officeType || p.office_type || p.OFFICE_TYPE ||
        p.stn_detail || p.STN_DETAIL ||
        p.siteType || p.SITE_TYPE || ""
      ).trim().toUpperCase();

    if (!ot) return false;
    return officeTypes.has(ot);
  };

  const matchesProgram = (p) => {
    if (!selectedPrograms.size) return true;

    const b = programBucket(p);

    // direct match
    if (selectedPrograms.has(b)) return true;

    // Parent selections that should include their children
    // ASOS is intentionally NOT expanded here.
    // That keeps ASOS, ACU, DCP, and DoW independent.
    if (selectedPrograms.has("AWIPS")) {
      if (b === "AWIPS" || b === "SBN") return true;
    }

    if (selectedPrograms.has("BUOYS")) {
      if (b === "BUOYS" || b === "BUOY" || b === "DART" || b === "TAO" || b === "OTHER" || b === "C-MAN") return true;
    }

    if (selectedPrograms.has("RADAR")) {
      if (b === "RADAR" || b === "WSR88D" || b === "TDWR SPG" || b === "VWP") return true;
    }

    return false;
  };

  // ✅ BUOY owner filter
  // Applies to ALL rows where PIDS Col N / pgma = BUOY (PD),
  // regardless of subtype in Col AD (BUOY, DART, TAO, FIXED, etc.)
  const matchesBuoyAgency = (p) => {
    const cbNws   = !!document.getElementById("buoyAgencyNws")?.checked;
    const cbNoaa  = !!document.getElementById("buoyAgencyNoaa")?.checked;
    const cbOther = !!document.getElementById("buoyAgencyOther")?.checked;

    const selectedCount = [cbNws, cbNoaa, cbOther].filter(Boolean).length;

    // none checked or all checked => no filter
    if (selectedCount === 0 || selectedCount === 3) return true;

    const pgmaU = String(p.pgma ?? p.PGMA ?? "").trim().toUpperCase().replace(/\s+/g, "");
    const isBuoyPd = (pgmaU === "BUOY(PD)");

    // Only apply owner filter to BUOY (PD) parent rows
    if (!isBuoyPd) return true;

    const agency = classifyBuoyAgency_(p.pgmaGroup ?? "");

    if (agency === "NWS" && cbNws) return true;
    if (agency === "NOAA" && cbNoaa) return true;
    if (agency === "OTHER" && cbOther) return true;

    return false;
  };


  // Apply all filters EXCEPT downOnly first (for Status Totals)
  const wwaOnly = !!document.getElementById("showWWAOnly")?.checked;
  const wwaWfos = new Set(
    (window.ACTIVE_WWA_WFOS || [])
      .map(x => String(x ?? "").trim().toUpperCase())
      .filter(Boolean)
  );

  const filteredAll = (features || []).filter(f => {
    const p = f?.properties || {};
    if (isExcludedProgram(programBucket(p))) return false;
    if (!matchesText(p)) return false;
    if (!matchesRegion(p)) return false;
    if (!matchesOfficeType(p)) return false;
    if (!matchesProgram(p)) return false;

    // ✅ NEW: WWA-only filter (PIDS Col AE -> p.office) must be in WWA sheet Col B
    if (wwaOnly) {
      const wfo = String(p.office ?? "").trim().toUpperCase();
      if (!wfo || !wwaWfos.has(wfo)) return false;
    }

    if (!matchesBuoyAgency(p)) return false;
    return true;
  });


  // ✅ This is the set used by Status Totals (ignores showDownOnly)
  window._statusTotalsFeatures = filteredAll;

  // Then apply downOnly for what we render (if enabled)
  let filteredForMap =
    downOnly
      ? filteredAll.filter(f => isOutageStatus_(getStatusValue_(f?.properties || {})))
      : hideOutages
        ? filteredAll.filter(f => !isOutageStatus_(getStatusValue_(f?.properties || {})))
        : filteredAll;

  // Parent should draw on top when parent + child are both selected.
  // Sort child first / parent last before renderPoints().
  filteredForMap = filteredForMap.slice().sort((a, b) => {
    const pa = a?.properties || {};
    const pb = b?.properties || {};

    const ba = programBucket(pa);
    const bb = programBucket(pb);

    const da = _programDrawPriority_(ba);
    const db = _programDrawPriority_(bb);

    if (da !== db) return da - db;

    const aId = String(pa.pidAdj || pa.pid || pa.PID || pa.siteId || pa.sid || "").trim().toUpperCase();
    const bId = String(pb.pidAdj || pb.pid || pb.PID || pb.siteId || pb.sid || "").trim().toUpperCase();

    return aId.localeCompare(bId);
  });

  // Update global for Down table builder
  currentFilteredFeatures = filteredForMap;
  window._currentFilteredFeatures = filteredForMap;

  // Render points
  try { renderPoints(filteredForMap); } catch (e) { console.error("renderPoints failed:", e); }

  // Update panels
  try { updateTypeBreakdown(); } catch (e) {}
  try { renderDownTable(); } catch (e) {}
  try { updateDownCounter(); } catch (e) {}

  // Optional zoom-to-focus
  if (zoomFocus) {
    try { zoomToFeatures_(filteredForMap); } catch (e) {}
  }

  // Persist filter state
  try { saveFiltersToStorage(); } catch (e) {}
}
