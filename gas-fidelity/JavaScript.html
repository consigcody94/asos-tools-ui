<script>
/* ===========================
 * NWS Systems Status — client script (working baseline)
 * =========================== */

window.isAppInitialized = window.isAppInitialized ?? false;
window.APP_DEBUG = (typeof window.APP_DEBUG === "boolean") ? window.APP_DEBUG : false;
window.dbg = window.dbg || function(){};
if (window.APP_DEBUG) window.dbg = (a) => console.log(a);

let features = [];
let nextRefreshTime;
let lastDataRefreshUtc = null;
const REFRESH_INTERVAL_MS = 300000; // 5 min

/* ===== Fetch / Refresh ===== */
function scheduleNextFetch() {
  if (!nextRefreshTime) return;
  const delay = Math.max(nextRefreshTime - Date.now() + 1000, 5000);
  setTimeout(fetchData, delay);
}

const EXCLUDED_PROGRAMS = new Set(['CRS']);
const isExcludedProgram = (name) => EXCLUDED_PROGRAMS.has(String(name || '').trim().toUpperCase());

const PROGRAM_ICON_META = {
  // --- ASOS family ---
  "ASOS (PD)": { letter: "A",  shape: "rectangle",      label: "ASOS (Station)" },
  "ASOS(PD)":  { letter: "A",  shape: "rectangle",      label: "ASOS (Station)" },
  "ASOS":      { letter: "A",  shape: "rectangle",      label: "ASOS (Station)" },

  "ACU":       { letter: "Aa", shape: "rectangle",      label: "ACU" },
  "AA":        { letter: "Aa", shape: "rectangle",      label: "ACU" },

  "DCP":       { letter: "Ad", shape: "rectangle",      label: "DCP" },
  "AD":        { letter: "Ad", shape: "rectangle",      label: "DCP" },

  "DOW":       { letter: "Do", shape: "rectangle",      label: "DoW" },
  "DOD/USN":   { letter: "Do", shape: "rectangle",      label: "DoW" },

  // --- AWIPS family ---
  "AWIPS(PD)": { letter: "W",  shape: "hexagon",        label: "AWIPS" },
  "AWIPS (PD)":{ letter: "W",  shape: "hexagon",        label: "AWIPS" },
  "AWIPS":     { letter: "W",  shape: "hexagon",        label: "AWIPS" },

  "SBN":       { letter: "S",  shape: "hexagon",        label: "SBN" },

  // --- NWR ---
  "NWR(PD)":   { letter: "N",  shape: "pentagon",       label: "NWR" },
  "NWR (PD)":  { letter: "N",  shape: "pentagon",       label: "NWR" },
  "NWR":       { letter: "N",  shape: "pentagon",       label: "NWR" },

  // --- RADAR family ---
  "RADAR (PD)":{ letter: "R",  shape: "square",         label: "RADAR" },
  "RADAR(PD)": { letter: "R",  shape: "square",         label: "RADAR" },
  "RADAR":     { letter: "R",  shape: "square",         label: "RADAR" },

  "WSR88D":    { letter: "88", shape: "square",         label: "WSR88D" },
  "TDWR SPG":  { letter: "TD", shape: "square",         label: "TDWR SPG" },
  "VWP":       { letter: "VW", shape: "square",         label: "VWP" },

  // --- Buoys ---
  "BUOY":      { letter: "B",  shape: "diamond",        label: "BUOY" },
  "BUOY (PD)": { letter: "B",  shape: "diamond",        label: "BUOY" },
  "BUOY(PD)":  { letter: "B",  shape: "diamond",        label: "BUOY" },
  "BUOYS":     { letter: "B",  shape: "diamond",        label: "BUOY" },

  "DART":      { letter: "D",  shape: "diamond",        label: "DART" },
  "TAO":       { letter: "T",  shape: "diamond",        label: "TAO" },

  "OTHER":     { letter: "O",  shape: "diamond",        label: "Other Buoys" },
  "FIXED":     { letter: "O",  shape: "diamond",        label: "Other Buoys" },
  "OILRIG":    { letter: "O",  shape: "diamond",        label: "Other Buoys" },
  "USV":       { letter: "O",  shape: "diamond",        label: "Other Buoys" },
  "C-MAN":     { letter: "CM", shape: "diamond",        label: "C-MAN" },

  // --- Other ---
  "FACILITIES":{ letter: "F",  shape: "star",           label: "NWS Facility" },
  "UA":        { letter: "U",  shape: "circle",         label: "UA" },

  // --- Reserved for future program ---
  "__FUTURE__":{ letter: "X",  shape: "triangle",       label: "Future Program" }
};

function getProgramIconMeta(program){
  const key = String(program || "").trim().toUpperCase();
  return PROGRAM_ICON_META[key] || { letter: "", shape: "circle", label: key || "Program" };
}

function programToLetter(program){
  return getProgramIconMeta(program).letter || "";
}

function programToShape(program){
  return getProgramIconMeta(program).shape || "circle";
}

/* ===== Utility ===== */
function clamp(n, min, max){
  n = Number(n);
  if (!Number.isFinite(n)) n = min;
  return Math.min(max, Math.max(min, n));
}


// --- Status normalization (handles "SVC BU" vs "SVCBU", etc.) ---
function normStatus(v){
  const raw = String(v ?? "").trim();
  if (!raw) return "";

  const s = raw.toLowerCase();
  const t = s.replace(/\s+/g, "").replace(/_/g, "");

  // Exact / canonical
  if (t === "svcbu") return "svcbu";
  if (t === "patching") return "patching";
  if (t === "degraded") return "degraded";
  if (t === "down") return "down";
  if (t === "up" || t === "operational") return "up";

  // Fuzzy (covers "SVC BU", "SVCBU (provider)", "PATCH", etc.)
  if (t.includes("svcbu")) return "svcbu";
  if (t.includes("patch")) return "patching";
  if (t.includes("degrad")) return "degraded";
  if (t.includes("down")) return "down";
  if (t === "ok" || t.includes("up") || t.includes("operational")) return "up";

  return s;
}

function isOutageStatus_(v){
  const st = normStatus(v);
  return (st === "down" || st === "degraded" || st === "patching" || st === "svcbu");
}

/* =====================================================
 * GLOBAL utilities + symbol builders (fixes scope issues)
 * ===================================================== */
function clamp(n, min, max){
  n = Number(n);
  if (!Number.isFinite(n)) n = min;
  return Math.min(max, Math.max(min, n));
}

// Global symbol cache (never scoped inside init blocks)
window.__symbolCache = window.__symbolCache || new Map();

// Bump this any time you change SVG text placement/sizing logic
window.__symbolRenderVersion = "2026-04-07a";

/**
 * Global symbol builder (picture-marker SVG)
 * Reads window.__uiIconScale and window.__uiIconFontScale set by your sliders.
 */
window.getSymbol = window.getSymbol || function(status, zoom, program, ring){
  const st = normStatus(status);
  const isDown = (st === "down" || st === "svcbu");
  const isDegraded = (st === "degraded");
  const isPatching = (st === "patching");

  const fill = isDown ? "red" : (isPatching ? "#1e63ff" : (isDegraded ? "#ffd400" : "green"));
  const textFill = isDegraded ? "black" : "white";

  const iconScale = clamp(parseFloat(window.__uiIconScale ?? 1), 0.5, 3.0);
  const iconFontScale = clamp(parseFloat(window.__uiIconFontScale ?? 1), 0.5, 3.0);

  const meta = getProgramIconMeta(program);
  const letter = meta.letter || "";
  const shape = meta.shape || "circle";
  const isTwo = (String(letter || "").length >= 2);

  const progKey = String(program || "").trim().toUpperCase();
  const isAsosChildBadge =
    (progKey === "ACU"  || progKey === "AA" ||
     progKey === "DCP"  || progKey === "AD" ||
     progKey === "DOW"  || progKey === "DOD/USN");

  const isAsosRectLabel =
    (progKey === "ASOS" || progKey === "ASOS(PD)" || progKey === "ASOS (PD)" || isAsosChildBadge);

  // Keep degraded/patching larger, same as current behavior
  const base = isDown ? 5 : ((isDegraded || isPatching) ? 4 : 3);
  const size = base + zoom * 0.6;
  const px = Math.max(10, Math.round(size * 2));

  // Wider canvas for 2-character labels and some shapes
  let w = px;
  let h = px;
  if (isTwo) w += 6;
  if (shape === "rectangle" || shape === "pill" || shape === "shield") w += 4;

  w = Math.max(10, Math.round(w * iconScale));
  h = Math.max(10, Math.round(h * iconScale));

  const ICON_FONT_BASE = 0.82;
  const ICON_FONT_SCALE = ICON_FONT_BASE * iconFontScale;

  const fontSize = isAsosRectLabel
    ? (isTwo
        ? Math.max(7, Math.round(w * 0.34 * ICON_FONT_SCALE))
        : Math.max(7, Math.round(w * 0.40 * ICON_FONT_SCALE)))
    : (isTwo
        ? Math.max(6, Math.round(Math.min(w, h) * 0.40 * ICON_FONT_SCALE))
        : Math.max(6, Math.round(Math.min(w, h) * 0.50 * ICON_FONT_SCALE)));

  const safeLetter = letter
    ? String(letter).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    : "";

  let textDy = "0em";

  // Fine-tune visual centering per symbol/program
  if (isAsosRectLabel) {
    textDy = "0em";
  }
  else if (progKey === "SBN") textDy = "-0.10em";
  else if (progKey === "NWR" || progKey === "NWR(PD)" || progKey === "NWR (PD)") textDy = "-0.02em";
  else if (progKey === "FACILITIES") textDy = "0.01em";
  else if (progKey === "TAO") textDy = "-0.04em";
  else if (progKey === "UA") textDy = "-0.03em";

  function shapeSvg(shapeName){
    const stroke = 'stroke="black" stroke-width="0.8"';
    const cx = w / 2;
    const cy = h / 2;
    const r = Math.min(w, h) / 2 - 1;
    const left = 1;
    const top = 1;
    const right = w - 1;
    const bottom = h - 1;
    const rx = Math.max(3, Math.round(Math.min(w, h) * 0.16));

    switch (shapeName) {
      case "rounded-square":
        return '<rect x="' + left + '" y="' + top + '" width="' + (w - 2) + '" height="' + (h - 2) + '" rx="' + rx + '" ry="' + rx + '" fill="' + fill + '" ' + stroke + '/>';

      case "rectangle":
        return '<rect x="' + left + '" y="' + (top + 2) + '" width="' + (w - 2) + '" height="' + (h - 4) + '" rx="3" ry="3" fill="' + fill + '" ' + stroke + '/>';

      case "pill":
        return '<rect x="' + left + '" y="' + (top + 2) + '" width="' + (w - 2) + '" height="' + (h - 4) + '" rx="' + Math.round((h - 4) / 2) + '" ry="' + Math.round((h - 4) / 2) + '" fill="' + fill + '" ' + stroke + '/>';

      case "diamond":
        return '<polygon points="' + cx + ',1 ' + (w - 1) + ',' + cy + ' ' + cx + ',' + (h - 1) + ' 1,' + cy + '" fill="' + fill + '" ' + stroke + '/>';

      case "hexagon":
        return '<polygon points="' +
          (w*0.25) + ',1 ' +
          (w*0.75) + ',1 ' +
          (w-1) + ',' + cy + ' ' +
          (w*0.75) + ',' + (h-1) + ' ' +
          (w*0.25) + ',' + (h-1) + ' ' +
          '1,' + cy +
          '" fill="' + fill + '" ' + stroke + '/>';

      case "pentagon":
        return '<polygon points="' +
          cx + ',1 ' +
          (w-1) + ',' + (h*0.38) + ' ' +
          (w*0.80) + ',' + (h-1) + ' ' +
          (w*0.20) + ',' + (h-1) + ' ' +
          '1,' + (h*0.38) +
          '" fill="' + fill + '" ' + stroke + '/>';

      case "triangle":
        return '<polygon points="' + cx + ',1 ' + (w-1) + ',' + (h-1) + ' 1,' + (h-1) + '" fill="' + fill + '" ' + stroke + '/>';

      case "triangle-down":
        return '<polygon points="1,1 ' + (w-1) + ',1 ' + cx + ',' + (h-1) + '" fill="' + fill + '" ' + stroke + '/>';

      case "shield":
        return '<path d="M ' + (w*0.16) + ' 1 L ' + (w*0.84) + ' 1 L ' + (w-1) + ' ' + (h*0.34) + ' L ' + cx + ' ' + (h-1) + ' L 1 ' + (h*0.34) + ' Z" fill="' + fill + '" ' + stroke + '/>';

      case "octagon":
        return '<polygon points="' +
          (w*0.30) + ',1 ' +
          (w*0.70) + ',1 ' +
          (w-1) + ',' + (h*0.30) + ' ' +
          (w-1) + ',' + (h*0.70) + ' ' +
          (w*0.70) + ',' + (h-1) + ' ' +
          (w*0.30) + ',' + (h-1) + ' ' +
          '1,' + (h*0.70) + ' ' +
          '1,' + (h*0.30) +
          '" fill="' + fill + '" ' + stroke + '/>';

      case "star":
        return '<polygon points="' +
          cx + ',1 ' +
          (w*0.61) + ',' + (h*0.36) + ' ' +
          (w-1) + ',' + (h*0.38) + ' ' +
          (w*0.69) + ',' + (h*0.60) + ' ' +
          (w*0.80) + ',' + (h-1) + ' ' +
          cx + ',' + (h*0.74) + ' ' +
          (w*0.20) + ',' + (h-1) + ' ' +
          (w*0.31) + ',' + (h*0.60) + ' ' +
          '1,' + (h*0.38) + ' ' +
          (w*0.39) + ',' + (h*0.36) +
          '" fill="' + fill + '" ' + stroke + '/>';

      case "square":
        return '<rect x="' + left + '" y="' + top + '" width="' + (w - 2) + '" height="' + (h - 2) + '" fill="' + fill + '" ' + stroke + '/>';

      case "circle":
      default:
        return '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="' + fill + '" ' + stroke + '/>';
    }
  }

  const ringSvg = ring
    ? '<circle cx="' + (w/2) + '" cy="' + (h/2) + '" r="' + (Math.min(w,h)/2 + 0.5) + '" fill="none" stroke="#ffd400" stroke-width="2.6"/>'
    : '';

  const textLength = isAsosRectLabel
    ? Math.round(w * (isTwo ? 0.58 : 0.42))
    : (isTwo ? Math.round(w * 0.60) : Math.round(w * 0.52));

  const rectTextX = Math.round(w / 2);
  const rectTextY = Math.round(h / 2) + (isTwo ? 1 : 2);

  const defaultTextAttrs =
    ' x="50%" y="50%" dy="' + textDy + '"' +
    ' text-anchor="middle" dominant-baseline="central"' +
    ' font-family="Arial, sans-serif" font-weight="700" font-size="' + fontSize + '"' +
    ' letter-spacing="' + (isTwo ? '-0.15' : '0') + '"' +
    ' textLength="' + textLength + '"' +
    ' lengthAdjust="spacingAndGlyphs"' +
    ' fill="' + textFill + '" stroke="black" stroke-width="' + (isTwo ? '0.25' : '0.5') + '" paint-order="stroke"';

  const rectTextAttrs =
    ' x="' + rectTextX + '" y="' + rectTextY + '"' +
    ' text-anchor="middle" dominant-baseline="middle"' +
    ' font-family="Arial, sans-serif" font-weight="700" font-size="' + fontSize + '"' +
    ' letter-spacing="' + (isTwo ? '-0.05' : '0') + '"' +
    ' textLength="' + textLength + '"' +
    ' lengthAdjust="spacingAndGlyphs"' +
    ' fill="' + textFill + '" stroke="black" stroke-width="' + (isTwo ? '0.25' : '0.5') + '" paint-order="stroke"';

  const svg =
    '<svg xmlns="http://www.w3.org/2000/svg" width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '">' +
      shapeSvg(shape) +
      ringSvg +
      '<text ' + (isAsosRectLabel ? rectTextAttrs : defaultTextAttrs) + '>' +
        safeLetter +
      '</text>' +
    '</svg>';

  return {
    type: "picture-marker",
    url: "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg),
    width: w,
    height: h
  };
};

/**
 * Global cached symbol getter (renderPoints() can ALWAYS see this)
 */
window.getSymbolCached = window.getSymbolCached || function(status, zoom, program, ring){
  const iconScale = clamp(parseFloat(window.__uiIconScale ?? 1), 0.5, 3.0);
  const fontScale = clamp(parseFloat(window.__uiIconFontScale ?? 1), 0.5, 3.0);

  const k =
    String(window.__symbolRenderVersion || "v1") + "|" +
    String(status || "").toLowerCase() + "|" +
    String(zoom) + "|" +
    String(program || "").toUpperCase() + "|" +
    (ring ? "1" : "0") + "|" +
    iconScale + "|" + fontScale;

  const hit = window.__symbolCache.get(k);
  if (hit) return hit;

  const sym = window.getSymbol(status, zoom, program, ring);
  window.__symbolCache.set(k, sym);
  return sym;
};


// ✅ PIDS-row-status resolver (Col AP = "STATUS")
// Handles common casing/alias variations and falls back to scanning keys.
function getStatusValue_(p){
  const o = p || {};

  // 1) Prefer explicit known fields (most reliable)
  const direct =
    (o.status ?? o.STATUS ?? o.Status ?? "") ||
    (o.ap_status ?? o.AP_STATUS ?? o.apStatus ?? o.ApStatus ?? "") ||
    (o.pids_status ?? o.PIDS_STATUS ?? o.pidsStatus ?? "") ||
    (o.row_status ?? o.ROW_STATUS ?? o.rowStatus ?? "") ||
    (o.point_status ?? o.POINT_STATUS ?? o.pointStatus ?? "");

  if (String(direct || "").trim()) return direct;

  // 2) If server sent "STATUS" but with strange key casing/spaces, scan keys safely.
  // Prefer EXACT "STATUS" / "AP_STATUS" first; avoid grabbing "Facility Status" etc.
  const keys = Object.keys(o);

  const pick = (re) => {
    for (const k of keys) {
      if (re.test(k)) {
        const v = o[k];
        if (String(v ?? "").trim()) return v;
      }
    }
    return "";
  };

  // Most-specific first
  let v = pick(/^(AP[_\s-]?STATUS)$/i);
  if (String(v).trim()) return v;

  v = pick(/^(STATUS)$/i);
  if (String(v).trim()) return v;

  v = pick(/(PIDS|ROW|POINT)[_\s-]?STATUS/i);
  if (String(v).trim()) return v;

  // Last resort: any key that is exactly "status" ignoring punctuation
  v = pick(/status$/i);
  return v;
}

function buildOfficeTypeCheckboxes() {
  const host = document.getElementById("officeTypeCheckboxes");
  if (!host) return;

  const items = ["WFO", "RFC", "NC", "CWSU", "HQ", "OTHER"];
  host.innerHTML = items.map(v => `
    <label>
      <input type="checkbox" class="officeTypeCheckbox" value="${v}">
      ${v}
    </label>
  `).join("");
}

function buildProgramsTree() {
  const host = document.getElementById("programCheckboxes");
  if (!host) return;

  const groups = [
    { label: "ASOS",  children: ["ACU", "DCP", "DoW"] },
    { label: "AWIPS", children: ["SBN"] },

    // ✅ BUOYS: subtype filter choices
    { label: "BUOYS", children: ["BUOY", "DART", "TAO", "OTHER"] },

    { label: "FACILITIES", children: [] },
    { label: "NWR", children: [] },
    { label: "RADAR", children: ["TDWR SPG", "VWP", "WSR88D"] },
    { label: "UA", children: [] },
  ];

  host.innerHTML = groups.map(g => {
    const isBuoys = (g.label === "BUOYS");

    const childrenHtml = (g.children && g.children.length) ? `
      <div class="program-children">
        ${g.children.map(c => `
          <label>
            <input type="checkbox" class="programCheckbox" value="${c}">
            ${c}
          </label>
        `).join("")}
      </div>
    ` : ``;

        // ✅ BUOYS extra: divider + agency checkboxes + description (indented under BUOYS)
        const buoysExtras = isBuoys ? `
          <div style="margin:8px 0 6px;">
            <hr style="border:none;border-top:1px solid rgba(0,0,0,12);margin:8px 0;">
          </div>

          <div style="margin-top:4px; margin-left:18px;">
            <label style="display:flex;align-items:center;gap:8px;margin:4px 0; font-weight:600;">
              <input type="checkbox" id="buoyAgencyNws" class="buoyAgencyCheckbox" checked>
              <span>NWS</span>
            </label>

            <label style="display:flex;align-items:center;gap:8px;margin:4px 0; font-weight:600;">
              <input type="checkbox" id="buoyAgencyNoaa" class="buoyAgencyCheckbox">
              <span>NOAA</span>
            </label>

            <label style="display:flex;align-items:center;gap:8px;margin:4px 0; font-weight:600;">
              <input type="checkbox" id="buoyAgencyOther" class="buoyAgencyCheckbox">
              <span>Other</span>
            </label>

            <div style="font-size:11px; opacity:.8; margin-top:6px; margin-left:22px;">
              Applies to all rows where Col N = BUOY (PD). Col AD subtype (BUOY, DART, TAO, Fixed, etc.) does not change owner grouping.
            </div>
          </div>
        ` : ``;

    return `
      <div class="program-group">
        <label class="program-parent">
          <input type="checkbox" class="programCheckbox" value="${g.label}">
          ${g.label}
        </label>
        ${childrenHtml}
        ${buoysExtras}
      </div>
    `;
  }).join("");

  // Wire BUOYS agency checkboxes (they are created dynamically in the Programs tree)
  wireBuoyAgencyCheckboxes_();
}

function wireBuoyAgencyCheckboxes_(){
  const cbs = document.querySelectorAll(".buoyAgencyCheckbox");
  cbs.forEach(cb => {
    if (cb.dataset.wired === "1") return;
    cb.dataset.wired = "1";
    cb.addEventListener("change", () => {
      try { saveFiltersToStorage(); } catch(_) {}
      try { applyFilters(); } catch(_) {}
    });
  });
}

function classifyBuoyAgency_(raw){
  const v = String(raw || "").trim().toUpperCase();
  if (!v) return "OTHER";

  // NWS bucket: only NWS + NDBC
  if (
    v === "NDBC" ||
    v === "NWS" ||
    v.startsWith("NWS ") ||
    v.includes("NATIONAL WEATHER SERVICE")
  ) {
    return "NWS";
  }

  // NOAA bucket: NOAA-owned groups that are not NWS/NDBC
  if (
    v === "NOAA" ||
    v.startsWith("NOAA ") ||
    v.includes("NATIONAL OCEANIC AND ATMOSPHERIC ADMINISTRATION") ||
    v.includes("NOS") ||
    v.includes("CO-OPS") ||
    v.includes("COOPS") ||
    v.includes("PMEL")
  ) {
    return "NOAA";
  }

  return "OTHER";
}

function normalizeProgramForFilter(label) {
  let v = String(label || "").trim().toUpperCase();

  // strip "(PD)" and normalize whitespace
  v = v.replace(/\s*\(PD\)\s*/g, "").replace(/\s+/g, " ").trim();

  // Back-compat / aliases
  if (v === "UPPER AIR") v = "UA";
  if (v === "BOUYS") v = "BUOYS";

  // ASOS subset alias
  if (v === "DOW" || v === "DOD/USN") return "DOW";

  // ASOS overlays
  if (v === "AA" || v === "ACU") return "ACU";
  if (v === "AD" || v === "DCP" || v.startsWith("DCP")) return "DCP";

  // Buoy subtype aliases
  if (v === "DATA BUOY") v = "BUOY";
  if (v === "DART BUOY") v = "DART";

  // ✅ Buoy "other" subtypes roll into OTHER
  if (v === "CMAN" || v === "C MAN" || v === "C-MAN") v = "OTHER";
  if (v === "FIXED" || v === "OILRIG" || v === "USV") v = "OTHER";

  if (v === "SBN" || v.includes("SBN")) return "SBN";

  // Parents / singles
  if (v === "ASOS") return "ASOS";
  if (v.startsWith("AWIPS")) return "AWIPS";
  if (v.startsWith("NWR")) return "NWR";

  if (v === "RADAR" || v.startsWith("RADAR")) return "RADAR";
  if (v === "WSR88D") return "WSR88D";
  if (v === "TDWR SPG") return "TDWR SPG";
  if (v === "VWP") return "VWP";

  if (v === "BUOYS") return "BUOYS";
  if (v === "BUOY") return "BUOY";
  if (v === "DART") return "DART";
  if (v === "TAO") return "TAO";

  if (v === "FACILITIES") return "FACILITIES";

  return v;
}

// ------------------------------
// Fast data load via web-app JSON endpoint first,
// with google.script.run fallback.
// This fixes stale same-browser/session responses by:
//   - using a direct JSON request
//   - forcing cache:no-store
//   - adding a unique _ts query param every request
// ------------------------------
function callServer_(fnName, argsArray) {
  argsArray = Array.isArray(argsArray) ? argsArray : [];
  return new Promise(function(resolve, reject) {
    if (!google || !google.script || !google.script.run) {
      reject(new Error("google.script.run not available"));
      return;
    }
    const runner = google.script.run
      .withSuccessHandler(resolve)
      .withFailureHandler(function(err){
        const msg = (err && err.message) ? err.message : String(err);
        reject(new Error(msg));
      });

    if (typeof runner[fnName] !== "function") {
      reject(new Error("Server function not found: " + fnName));
      return;
    }
    runner[fnName].apply(runner, argsArray);
  });
}

// ------------------------------
// Apps Script iframe-safe point loading
// Avoid browser fetch() here because /dev and /exec JSON fetches from the
// Apps Script iframe can be blocked by CORS / preflight.
// google.script.run stays same-origin to the host shell and is reliable here.
// ------------------------------
function fetchPointsPass_(pass, force) {
  pass = String(pass || "base");
  force = !!force;

  return callServer_("getPointsPayload", [pass, force]).then(function(res) {
    if (!res || res.ok !== true) {
      throw new Error((res && res.error) ? res.error : "Point payload was not ok");
    }
    return res;
  });
}

function fetchData(forceServerRefresh) {
  forceServerRefresh = !!forceServerRefresh;

  const fetchId = (window.__activeFetchId || 0) + 1;
  window.__activeFetchId = fetchId;

  var t = document.getElementById("refresh-timer");
  if (t) t.textContent = "(Refreshing...)";

  // Reset gating flags each cycle
  window.__basePointsRendered = false;
  window.__asosApplied = false;
  window._pendingAsosOverlays = null;
  window.__overlayQueueRunning = false;

  setLoadStatus("Loading points...");

  // Reuse warm server cache on normal loads; only force a rebuild for explicit manual refreshes.
  fetchPointsPass_("base", forceServerRefresh)
    .then(function (res) {
      if (fetchId !== window.__activeFetchId) return;

      if (res && res.expirationTimestamp) nextRefreshTime = res.expirationTimestamp;
      else nextRefreshTime = Date.now() + REFRESH_INTERVAL_MS;

      lastDataRefreshUtc = res && res.servedAtUtc ? new Date(res.servedAtUtc) : new Date();

      try {
        const ls = document.getElementById("load-status");
        if (ls && res) {
          const mode = res.refreshedStatus || "unknown";
          const served = res.servedAtUtc || "--";
          ls.textContent = `Loading points... [${mode}] served ${served}`;
        }
      } catch (_) {}

      scheduleNextFetch();
      updateLastUpdatedBanner();
      updateTimerDisplay();

      var meta = res && res.meta ? res.meta : {};
      var banners = res && res.banners ? res.banners : { cwdBanner: "", eceBanner: "" };

      window.ACTIVE_WWA_WFOS = (res && Array.isArray(res.wwaWfos)) ? res.wwaWfos : [];

      var feats = (res && Array.isArray(res.features)) ? res.features : [];

      onAllDataReceived([[feats], banners, [], meta]);

      // Let the header make clear the next phase is status/ASOS update
      setLoadStatus("Updating: ASOS...");
      return fetchPointsPass_("overlay", forceServerRefresh);
    })
    .then(function (ov) {
      if (fetchId !== window.__activeFetchId) return;

      var featsOv = (ov && Array.isArray(ov.features)) ? ov.features : [];

      if (!featsOv.length) {
        if (window.__basePointsRendered) {
          try { drainOverlayInstallQueue_(); } catch (_) {}
        }
        return;
      }

      window._pendingAsosOverlays = featsOv;

      if (window.__basePointsRendered) {
        try { applyPendingAsosOverlays_(); } catch (e) { console.warn(e); }
      }
    })
    .catch(function (err) {
      if (fetchId !== window.__activeFetchId) return;
      onDataError(err);
    });
}


function applyPendingAsosOverlays_() {
  if (window.__asosApplied) return;

  var ov = window._pendingAsosOverlays;
  if (!Array.isArray(ov) || !ov.length) {
    try { drainOverlayInstallQueue_(); } catch (_) {}
    return;
  }

  // applyFilters is defined inside initializeApp()/ArcGIS require() scope.
  // We expose it as window.applyFilters once the map initializes.
  if (typeof window.applyFilters !== "function") {
    setTimeout(function () {
      try { applyPendingAsosOverlays_(); } catch (_) {}
    }, 75);
    return;
  }

  window.__asosApplied = true;
  window._pendingAsosOverlays = null;

  try {
    features = (Array.isArray(features) ? features : []).concat(ov);
  } catch (_) {
    features = ov;
  }

  setLoadStatus("Updating: ASOS...");
  try { window.applyFilters(); }
  catch (e) { console.warn("applyFilters (after ASOS overlays) failed:", e); }

  setTimeout(function () {
    try { drainOverlayInstallQueue_(); } catch (_) {}
  }, 0);
}

  return map[String(name || "").toLowerCase()] || String(name || "").toUpperCase();

function overlayPriority_(name){
  const order = {
    radar: 10,
    wwa: 20,
    rfc: 30,
    wfo: 40,
    cwsu: 50,
    mcc: 60,
    reg: 70,
    tz: 80
  };
  return order[String(name || "").toLowerCase()] ?? 999;
}

function queueOverlayInstall_(name, layerId, fn) {
  if (typeof fn !== "function") return;

  window.__overlayInstallQueue = window.__overlayInstallQueue || [];

  const key = String(name || "").toLowerCase();
  const exists = window.__overlayInstallQueue.some(item => String(item.name || "").toLowerCase() === key);
  if (exists) return;

  window.__overlayInstallQueue.push({
    name: key,
    layerId: layerId || "",
    fn: fn
  });
}

function drainOverlayInstallQueue_() {
  if (window.__overlayQueueRunning) return;
  if (!window.__basePointsRendered) return;

  window.__overlayInstallQueue = window.__overlayInstallQueue || [];
  if (!window.__overlayInstallQueue.length) {
    clearLoadStatus();
    return;
  }

  window.__overlayInstallQueue.sort((a, b) => overlayPriority_(a.name) - overlayPriority_(b.name));

  const item = window.__overlayInstallQueue.shift();
  if (!item || typeof item.fn !== "function") {
    setTimeout(drainOverlayInstallQueue_, 0);
    return;
  }

  window.__overlayQueueRunning = true;
  setLoadStatus("Updating: " + overlayDisplayName_(item.name) + "...");

  try {
    item.fn();
  } catch (e) {
    console.warn("Overlay install failed:", item.name, e);
  }

  const started = Date.now();
  const waitMs = 8000;
  const layerId = String(item.layerId || "");

  function done() {
    window.__overlayQueueRunning = false;

    if (window.__overlayInstallQueue.length) {
      setTimeout(drainOverlayInstallQueue_, 100);
    } else {
      clearLoadStatus();
    }
  }

  if (!layerId || !window._esriView || !window._esriView.map) {
    setTimeout(done, 600);
    return;
  }

  (function pollForLayer(){
    try {
      const lyr = window._esriView.map.findLayerById(layerId);
      if (lyr) {
        setTimeout(done, 400);
        return;
      }
    } catch (_) {}

    if ((Date.now() - started) >= waitMs) {
      done();
      return;
    }

    setTimeout(pollForLayer, 150);
  })();
}

function buildDownRowsFromFeatures() {
  const downOnly = !!document.getElementById("showDownOnly")?.checked;

  // If ShowOnlyDown is ON, the table/counter must follow what is drawn on the map.
  // Otherwise, use the "status totals" set (ignores showDownOnly).
  const feats = downOnly
    ? (Array.isArray(window._currentFilteredFeatures) ? window._currentFilteredFeatures : [])
    : (Array.isArray(window._statusTotalsFeatures) ? window._statusTotalsFeatures :
       (Array.isArray(window._currentFilteredFeatures) ? window._currentFilteredFeatures : []));

  const rows = [];
  const seen = new Set();

  const cleanProg = (s) => String(s || "").replace(/\s*\(PD\)\s*/i, "").trim();

  const normalizeDisplay = (s) => {
    const v = cleanProg(s).toUpperCase();
    if (v === "DATA BUOY" || v === "BUOY") return "BUOY";
    if (v === "DART BUOY" || v === "DART") return "DART";
    if (v === "CMAN" || v === "C MAN" || v === "C-MAN") return "C-MAN";
    if (v === "WSR-88D" || v === "WSR88D") return "WSR88D";
    return cleanProg(s) || "—";
  };

  for (const f of feats) {
    const p = f?.properties || {};
    const st = normStatus(getStatusValue_(p));
    const isOut = isOutageStatus_(st);

    if (!isOut) continue;

    const pid = String(p.pidAdj || p.pid || p.PID || p.siteId || "").trim().toUpperCase();
    const sid = String(p.sid || p.SID || "").trim().toUpperCase();

    // We'll decide displayId after we compute programDisplay (so UA can synthesize P+SID if needed)
    let displayId = pid || sid;
    if (!displayId) continue;

    // WFO from feature (features already try to fill office server-side)
    let wfo = String(p.office || p.WFO || "—").trim();

    const pgma = String(p.pgma || p.PGMA || "").trim().toUpperCase();
    const kind = String(p.kind || "").trim().toUpperCase();
    const subtype = String(p.subtype || "").trim().toUpperCase();

    // Default program display from type/program
    let programDisplay = normalizeDisplay(p.type || p.programType || p.program || pgma);

    if (pgma === "ASOS (PD)") {
      const pgmaGroup = String(p.pgmaGroup || "").trim().toUpperCase();
      const isAcu = (kind === "ACU");
      const isDcp = kind.startsWith("DCP") || programDisplay === "DCP";
      const isDoW = (pgmaGroup === "DOD/USN");

      if (isAcu) programDisplay = "ACU";
      else if (isDcp) programDisplay = "DCP";
      else if (isDoW) programDisplay = "DOW";
      else programDisplay = "ASOS";
    }

    // RADAR subtype display (WSR88D vs TDWR SPG)
    if (pgma === "RADAR (PD)") {
      programDisplay = normalizeDisplay(subtype || "RADAR");
    }

    // AWIPS: last column shows provider when present
    if (programDisplay === "AWIPS") {
      const svc = String(p.svcbuProvidedBy || "").trim();
      if (svc) wfo = svc;
    }

    const key = `${displayId}|${programDisplay}`;
    if (seen.has(key)) continue;
    seen.add(key);

    rows.push({ site: displayId, program: programDisplay, wfo, status: st });

  }

  rows.sort((a, b) => a.program.localeCompare(b.program) || a.site.localeCompare(b.site));

  return rows;
}

function renderDownTable() {
  const table = document.getElementById("downTable");
  if (!table) return;

  const list = buildDownRowsFromFeatures();

  const PARENTS_IN_ORDER = ["ASOS", "AWIPS", "BUOYS", "FACILITIES", "NWR", "RADAR", "UA"];
  const CHILD_TO_PARENT = new Map([
    ["ACU", "ASOS"], ["DCP", "ASOS"], ["DOW", "ASOS"],
    ["SBN", "AWIPS"],
    ["BUOY", "BUOYS"], ["DART", "BUOYS"], ["TAO", "BUOYS"], ["OTHER", "BUOYS"],

    ["TDWR SPG", "RADAR"], ["VWP", "RADAR"], ["WSR88D", "RADAR"],
  ]);

  const parentFor = (prog) => {
    const k = normalizeProgramForFilter(prog);
    return CHILD_TO_PARENT.get(k) || (PARENTS_IN_ORDER.includes(k) ? k : k);
  };

  // Group by parent
  const byParent = Object.create(null);
  for (const r of list) {
    const parent = parentFor(r.program);
    (byParent[parent] ||= []).push(r);
  }

  const parentsSorted = Object.keys(byParent).sort((a, b) => {
    const ia = PARENTS_IN_ORDER.indexOf(a);
    const ib = PARENTS_IN_ORDER.indexOf(b);
    if (ia === -1 && ib === -1) return a.localeCompare(b);
    if (ia === -1) return 1;
    if (ib === -1) return -1;
    return ia - ib;
  });

  let bodyHtml = "";

  if (!parentsSorted.length) {
    bodyHtml = `<tr><td colspan="4">No Down/Degraded/Patching/SVCBU sites</td></tr>`;
  } else {
    for (const parent of parentsSorted) {
      const entries = byParent[parent].slice().sort((a, b) => a.site.localeCompare(b.site));

      const storageKey = `downProgExpanded_${parent}`;
      const expanded = (localStorage.getItem(storageKey) ?? "true") === "true";
      const chev = expanded ? "▾" : "▸";

      bodyHtml += `
        <tr class="down-group-header" data-prog="${parent}">
          <td colspan="4"><span class="chev">${chev}</span> ${parent} (${entries.length})</td>
        </tr>
      `;

      for (const r of entries) {
        bodyHtml += `
          <tr class="down-item-row" data-parent="${parent}" style="${expanded ? "" : "display:none;"}">
            <td class="status-cell">${statusBadgeHtml_(r.status)}</td>
            <td>${escapeHtml_(r.site)}</td>
            <td>${escapeHtml_(r.program)}</td>
            <td>${escapeHtml_(r.wfo)}</td>
          </tr>
        `;
      }
    }
  }

  const awipsExpanded = (localStorage.getItem("downProgExpanded_AWIPS") ?? "true") === "true";
  const lastColHeader = awipsExpanded ? "SVCBU By" : "Office";

  table.innerHTML = `
    <thead>
      <tr>
        <th style="width:44px;"></th>
        <th>Site</th>
        <th>Program</th>
        <th>
          Office/<br>
          SVCBU By
        </th>
      </tr>
    </thead>
    <tbody>
      ${bodyHtml}
    </tbody>
  `;

  // One-time click handler for expand/collapse
  if (!table.dataset.downWire) {
    table.dataset.downWire = "1";
    table.addEventListener("click", (e) => {
      const tr = e.target?.closest?.("tr.down-group-header");
      if (!tr) return;

      const parent = String(tr.getAttribute("data-prog") || "").trim();
      if (!parent) return;

      const key = `downProgExpanded_${parent}`;
      const expanded = (localStorage.getItem(key) ?? "true") === "true";
      localStorage.setItem(key, expanded ? "false" : "true");

      // Re-render to apply the show/hide + chevron state
      renderDownTable();
    });
  }

  try { updateDownCounter(); } catch(_) {}
}

function onAllDataReceived([featureChunks, bannerData, _unusedOutagesList, meta]) {

  setLoadStatus("Rendering points…");

  const allFeatures = [].concat.apply([], featureChunks || []);

  const data = {
    geojson: { type: "FeatureCollection", features: allFeatures },
    regions: meta?.regions || [],
    types:   meta?.types   || [],
    cwdBanner: bannerData?.cwdBanner || "",
    eceBanner: bannerData?.eceBanner || "",
  };

    // ✅ Render CWD/ECE banners
  renderCwdEceBanners_(data.cwdBanner, data.eceBanner);

  features = Array.isArray(data.geojson?.features) ? data.geojson.features : [];

  // ✅ Build filter UI BEFORE loading persisted selections
  try {
    populateCheckboxes("regionCheckboxes", meta?.regions || data.regions || [], "regionCheckbox");
    buildOfficeTypeCheckboxes();
    buildProgramsTree();
  } catch (e) {
    console.warn("Filter UI build failed:", e);
  }

  // ✅ If the map isn't ready yet, stash features and render as soon as it is.
  // This fixes the race where data arrives before initializeApp()/require() finishes.
  window._pendingFeaturesForRender = features;

  (function tryRenderWhenReady() {
    if (typeof window.updateMapAndTables === "function") {
      const pf = Array.isArray(window._pendingFeaturesForRender) ? window._pendingFeaturesForRender : [];
      window._pendingFeaturesForRender = null;

      try {
        window.updateMapAndTables(pf);
      } catch (e) {
        console.error("updateMapAndTables failed:", e);
      }

      // renderPoints() refreshes table/counters, but give it a small nudge in case
      setTimeout(() => {
        try { updateDownCounter(); } catch(e) {}
        try { renderDownTable([]); } catch(e) {}
        try { updateTypeBreakdown(); } catch(e) {}
      }, 50);

      clearLoadStatus();
      return;
    }

    // Not ready yet – try again shortly
    setTimeout(tryRenderWhenReady, 50);
  })();
}

}

const MAP_CLOCK_STORAGE_KEY = "mapClockCollapsed_v3";

function formatClockTs_(date, timeZone, suffix){
  try{
    const parts = new Intl.DateTimeFormat("en-CA", {
      timeZone: timeZone,
      year: "numeric",
      month: "2-digit",
      day: "2-digit",
      hour: "2-digit",
      minute: "2-digit",
      hour12: false
    }).formatToParts(date);

    const get = (type) => {
      const hit = parts.find(p => p.type === type);
      return hit ? hit.value : "";
    };

    const y  = get("year");
    const m  = get("month");
    const d  = get("day");
    const hh = get("hour");
    const mm = get("minute");

    return `${y}-${m}-${d} ${hh}:${mm} ${suffix}`;
  } catch(e){
    return "--";
  }
}

function updateMapClockBar_(now){
  const ts = now instanceof Date ? now : new Date();

  const values = {
    "clock-guam":     formatClockTs_(ts, "Pacific/Guam", "ChST"),
    "clock-pacific":  formatClockTs_(ts, "America/Los_Angeles", "PT"),
    "clock-alaska":   formatClockTs_(ts, "America/Anchorage", "AK"),
    "clock-hawaii":   formatClockTs_(ts, "Pacific/Honolulu", "HT"),
    "clock-mountain": formatClockTs_(ts, "America/Denver", "MT"),
    "clock-central":  formatClockTs_(ts, "America/Chicago", "CT"),
    "clock-eastern":  formatClockTs_(ts, "America/New_York", "ET"),
    "clock-zulu":     formatClockTs_(ts, "UTC", "UTC")
  };

  Object.entries(values).forEach(([id, text]) => {
    const el = document.getElementById(id);
    if (el) el.textContent = text;
  });

  positionMapClockBar_();
}

function positionMapClockBar_(){
  const bar = document.getElementById("mapClockBar");
  const main = document.getElementById("mainContainer");
  if (!bar || !main) return;

  const mainRect = main.getBoundingClientRect();
  const zoomDock = window._zoomDock || document.getElementById("zoomDock");
  const rightToggle = document.getElementById("toggleRightSidebarBtn");

  let left = 56;
  let top = 8;
  let right = 340;

  if (zoomDock) {
    const z = zoomDock.getBoundingClientRect();
    left = Math.max(48, Math.round(z.right - mainRect.left + 8));
    top  = Math.max(6, Math.round(z.top - mainRect.top));
  }

  if (rightToggle) {
    const rt = rightToggle.getBoundingClientRect();
    right = Math.max(24, Math.round(mainRect.right - rt.left + 8));
  }

  bar.style.left = `${left}px`;
  bar.style.top = `${top}px`;
  bar.style.right = `${right}px`;
}

function pad2_(n){
  return String(n).padStart(2, "0");
}

function parseUtcLikeDate_(value){
  if (value == null || value === "") return null;

  if (value instanceof Date && !isNaN(value.getTime())) {
    return value;
  }

  const s = String(value).trim();
  if (!s) return null;

  // Already in target display format:
  // Tue Mar 17 2026 10:51:59 UTC
  let m = s.match(
    /^(Sun|Mon|Tue|Wed|Thu|Fri|Sat)\s+(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s+(\d{1,2})\s+(\d{4})\s+(\d{2}):(\d{2}):(\d{2})\s+UTC$/i
  );
  if (m) {
    const MONTH_INDEX = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
    return new Date(Date.UTC(
      Number(m[4]),
      MONTH_INDEX[m[2].slice(0,1).toUpperCase() + m[2].slice(1,3).toLowerCase()],
      Number(m[3]),
      Number(m[5]),
      Number(m[6]),
      Number(m[7])
    ));
  }

  // Matches:
  // 2026-03-13 23:00:00
  // 2026/03/13 23:00:00
  // 2026 03 13 23:00:00
  // optional seconds, optional UTC/Z
  m = s.match(
    /^(\d{4})[-\/ ](\d{1,2})[-\/ ](\d{1,2})(?:[ T]+(\d{1,2}):(\d{2})(?::(\d{2}))?)?\s*(UTC|Z)?$/i
  );
  if (m) {
    return new Date(Date.UTC(
      Number(m[1]),
      Number(m[2]) - 1,
      Number(m[3]),
      Number(m[4] || 0),
      Number(m[5] || 0),
      Number(m[6] || 0)
    ));
  }

  const d = new Date(s);
  if (!isNaN(d.getTime())) return d;

  return null;
}

function formatUnifiedUtcTs_(value){
  const d = parseUtcLikeDate_(value);
  if (!(d instanceof Date) || isNaN(d.getTime())) return "--";

  const DAY_NAMES = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const MONTH_NAMES = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  return `${DAY_NAMES[d.getUTCDay()]} ${MONTH_NAMES[d.getUTCMonth()]} ${pad2_(d.getUTCDate())} ${d.getUTCFullYear()} ${pad2_(d.getUTCHours())}:${pad2_(d.getUTCMinutes())}:${pad2_(d.getUTCSeconds())} UTC`;
}

function formatHeaderNowTsWithSeconds_(date, suffix){
  return formatUnifiedUtcTs_(date);
}

function formatIsoUtcForHeader_(date){
  return formatUnifiedUtcTs_(date);
}

function formatPopupUtcFromAny_(value){
  return formatUnifiedUtcTs_(value);
}

function updateLastUpdatedBanner(){
  const now = new Date();

  const currentEl = document.getElementById("current-time");
  const updatedEl = document.getElementById("last-updated");

  if (currentEl) {
    currentEl.textContent = "Current Time: " + formatUnifiedUtcTs_(now);

  updateMapClockBar_(now);
}

function initMapClockBar_(){
  const bar = document.getElementById("mapClockBar");
  const btn = document.getElementById("mapClockToggle");
  if (!bar || !btn) return;

  const applyState = (collapsed) => {
    bar.classList.toggle("collapsed", !!collapsed);
    bar.classList.toggle("expanded", !collapsed);
    btn.textContent = collapsed ? "🕒" : "▾";
    btn.setAttribute("aria-expanded", collapsed ? "false" : "true");
    btn.title = collapsed ? "Expand clocks" : "Collapse clocks";
    try { localStorage.setItem(MAP_CLOCK_STORAGE_KEY, collapsed ? "true" : "false"); } catch(_) {}
    positionMapClockBar_();
  };

  let collapsed = false;
  try {
    collapsed = localStorage.getItem(MAP_CLOCK_STORAGE_KEY) === "true";
  } catch(_) {}

  applyState(collapsed);

  if (!btn.dataset.wired) {
    btn.dataset.wired = "1";
    btn.addEventListener("click", () => {
      applyState(!bar.classList.contains("collapsed"));
    });
  }

  updateLastUpdatedBanner();

  if (!mapClockTimer_) {
    const tick = () => {
      updateLastUpdatedBanner();

      const now = new Date();
      const delay = 1000 - now.getMilliseconds() + 10;
      mapClockTimer_ = setTimeout(tick, Math.max(100, delay));
    };

    const now = new Date();
    const firstDelay = 1000 - now.getMilliseconds() + 10;
    mapClockTimer_ = setTimeout(tick, Math.max(100, firstDelay));
  }

  window.addEventListener("resize", positionMapClockBar_);
  window.addEventListener("scroll", positionMapClockBar_, { passive: true });
}

/* ===== Helpers ===== */
function escapeHtml_(s){
  return String(s ?? "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;");
}

function renderCwdEceBanners_(cwdText, eceText){
  ensureCwdEceBannerStyles_();

  let host = document.getElementById("banner-container");

  // If banner-container is missing in Index.html, create it safely at the top
  if (!host) {
    host = document.createElement("div");
    host.id = "banner-container";
    document.body.insertBefore(host, document.body.firstChild);
  }

  host.classList.add("cwd-ece-banners");

  const cwd = String(cwdText || "").trim();
  const ece = String(eceText || "").trim();

  // Change these if you want different destinations
  const BANNER_LINKS = {
    CWD: "https://www.nco.ncep.noaa.gov/status/cwd/",
    ECE: "https://www.nco.ncep.noaa.gov/status/cwd/"
  };

  const bannerLineHtml_ = (txt) => {
    const s = String(txt || "").trim();
    if (!s) return "";

    const m = s.match(/^(CWD|ECE)\s*(.*)$/i);
    if (!m) return escapeHtml_(s);

    const typ = String(m[1] || "").toUpperCase();
    const rest = String(m[2] || "").trim();
    const href = BANNER_LINKS[typ] || "#";

    return `<a class="banner-token" href="${href}" target="_blank" rel="noopener noreferrer">${escapeHtml_(typ)}</a><span class="banner-rest">${rest ? " " + escapeHtml_(rest) : ""}</span>`;
  };

  let html = "";
  if (cwd) html += `<div class="banner banner-cwd">${bannerLineHtml_(cwd)}</div>`;
  if (ece) html += `<div class="banner banner-ece">${bannerLineHtml_(ece)}</div>`;

  host.innerHTML = html;
  host.style.display = html ? "flex" : "none";

  try { positionMapClockBar_(); } catch(_) {}
}

function populateCheckboxes(containerId, items, cssClass) {
  const el = document.getElementById(containerId);
  if (!el) return;

  // Keep spelled-out region names; hide abbreviated ones like SR/CR/ER/WR, etc.
  let list = Array.isArray(items) ? items.slice() : [];

  if (containerId === 'regionCheckboxes') {
    // If meta provides SR/CR/etc, map them to full names (DON'T drop them)
    const REGION_CODE_TO_NAME = {
      "SR": "Southern Region",
      "CR": "Central Region",
      "ER": "Eastern Region",
      "WR": "Western Region",
      "PR": "Pacific Region",
      "AR": "Alaska Region"
    };

    list = list
      .map(v => {
        const s = String(v ?? '').trim();
        if (!s) return "";
        const up = s.toUpperCase();
        return REGION_CODE_TO_NAME[up] || s;
      })
      .filter(Boolean);

    // De-dupe
    list = Array.from(new Set(list));
  }

  // Attribute-safe
  const escAttr = (s) => String(s ?? "")
    .replace(/&/g, "&amp;")
    .replace(/"/g, "&quot;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");

  // Text-safe
  const escText = (s) => String(s ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");

  // Display-only label shortening for Regions
  const regionDisplayLabel = (raw) => {
    let s = String(raw ?? "").trim();

    // Remove trailing "Region" (display only)
    s = s.replace(/\s*region\s*$/i, "").trim();

    // Special: NATL HDQTR/NC -> NATL HDQTR (display only)
    if (s.toUpperCase() === "NATL HDQTR/NC") s = "NATL HDQTR";

    return s;
  };

  el.innerHTML = list.map(v => {
    const value = String(v ?? "").trim(); // KEEP value unchanged for logic/storage
    const label = (containerId === "regionCheckboxes")
      ? regionDisplayLabel(value)
      : value;

    return `<label><input type="checkbox" class="${escAttr(cssClass)}" value="${escAttr(value)}"> ${escText(label)}</label>`;
  }).join('');
}


function updateTimerDisplay() {
  const t = document.getElementById("refresh-timer");

  if (!nextRefreshTime) {
    t.textContent = "(Next refresh in --:--)";

  const remain = nextRefreshTime - Date.now();
  const s = Math.max(Math.floor(remain / 1000), 0);
  t.textContent = `(Next refresh in ${Math.floor(s / 60)}:${String(s % 60).padStart(2, "0")})`;
}

/* =====================================================
 * UI SETTINGS (Font + Icon scaling) — NEW
 * ===================================================== */
const UI_SETTINGS_KEY = "uiSettings_v1";

function uiLoadSettings_(){
  const d = { fontScale: 1, iconScale: 1, iconFontScale: 1, link: false, linkRatio: 1 };
  try{
    const raw = localStorage.getItem(UI_SETTINGS_KEY);
    if (!raw) return d;
    const j = JSON.parse(raw);
    return {
      fontScale: clamp(parseFloat(j.fontScale ?? d.fontScale), 0.5, 2.5),
      iconScale: clamp(parseFloat(j.iconScale ?? d.iconScale), 0.5, 3.0),
      iconFontScale: clamp(parseFloat(j.iconFontScale ?? d.iconFontScale), 0.5, 3.0),
      link: !!(j.link ?? d.link),
      linkRatio: clamp(parseFloat(j.linkRatio ?? d.linkRatio), 0.1, 10)
    };
  } catch(_){
    return d;
  }
}
function uiSaveSettings_(s){
  try{ localStorage.setItem(UI_SETTINGS_KEY, JSON.stringify(s)); } catch(_){}
}
function uiApplyToDom_(s){
  // UI font scaling via CSS variable (Css.html overrides)
  try{
    document.documentElement.style.setProperty("--ui-font-scale", String(s.fontScale));
  } catch(_){}
  // Store icon settings globally so symbol scaling can see them
  window.__uiIconScale = s.iconScale;
  window.__uiIconFontScale = s.iconFontScale;
}

/* Symbol scaling: applied inside getSymbolCached() so we do NOT have to edit getSymbol() */
function uiClone_(obj){
  try { return structuredClone(obj); } catch(_){}
  try { return JSON.parse(JSON.stringify(obj)); } catch(_){}
  return obj;
}
function uiScaleSymbol_(sym){
  const iconScale = clamp(parseFloat(window.__uiIconScale ?? 1), 0.5, 3.0);
  const fontScale = clamp(parseFloat(window.__uiIconFontScale ?? 1), 0.5, 3.0);
  const s = uiClone_(sym);

  // SimpleMarkerSymbol
  if (s && typeof s === "object" && typeof s.size === "number") {
    s.size = s.size * iconScale;
    if (s.outline && typeof s.outline.width === "number") s.outline.width = s.outline.width * iconScale;
  }

  // TextSymbol (or anything with font.size)
  if (s && typeof s === "object" && s.font && typeof s.font.size === "number") {
    s.font.size = s.font.size * fontScale;
  }

  // Composite: if your symbols are arrays (marker + text), scale each
  if (Array.isArray(s)) {
    return s.map(uiScaleSymbol_);
  }

  // Some symbol factories wrap marker/text in "symbol" fields
  if (s && typeof s === "object" && s.symbol && typeof s.symbol === "object") {
    s.symbol = uiScaleSymbol_(s.symbol);
  }

  return s;
}

function uiUpdateSettingsUi_(){
  const s = uiLoadSettings_();
  uiApplyToDom_(s);

  const $font = document.getElementById("uiFontScale");
  const $fontV= document.getElementById("uiFontScaleValue");
  const $ico  = document.getElementById("uiIconScale");
  const $icoV = document.getElementById("uiIconScaleValue");
  const $icf  = document.getElementById("uiIconFontScale");
  const $icfV = document.getElementById("uiIconFontScaleValue");
  const $link = document.getElementById("uiLinkIconBtn");

  const pct = (x) => Math.round(x * 100) + "%";

  if ($font){ $font.value = String(s.fontScale.toFixed(2)); }
  if ($fontV){ $fontV.textContent = pct(s.fontScale); }

  if ($ico){ $ico.value = String(s.iconScale.toFixed(2)); }
  if ($icoV){ $icoV.textContent = pct(s.iconScale); }

  if ($icf){ $icf.value = String(s.iconFontScale.toFixed(2)); }
  if ($icfV){ $icfV.textContent = pct(s.iconFontScale); }

  if ($link){
    $link.textContent = s.link ? "Icon Link: ON" : "Icon Link: OFF";
  }
}

function uiWireSettingsUi_(){
  const header = document.getElementById("settingsHeader");
  const section = document.getElementById("settingsSection");
  if (!header || !section) return;

  // Use existing collapsible system if available
  if (typeof initCollapsibleEx === "function") {
    initCollapsibleEx("#settingsHeader", "#settingsSection", "settingsExpanded", false);
  }

  // Load/apply current
  uiUpdateSettingsUi_();

  let busy = false;

  const onChange = (src) => {
    if (busy) return;
    busy = true;

    const s = uiLoadSettings_();

    const $font = document.getElementById("uiFontScale");
    const $ico  = document.getElementById("uiIconScale");
    const $icf  = document.getElementById("uiIconFontScale");

    const nextFont = $font ? clamp(parseFloat($font.value), 0.8, 1.6) : s.fontScale;
    let nextIcon   = $ico  ? clamp(parseFloat($ico.value),  0.7, 1.8) : s.iconScale;
    let nextIconF  = $icf  ? clamp(parseFloat($icf.value),  0.7, 1.8) : s.iconFontScale;

    // If linked, preserve ratio captured in s.linkRatio
    if (s.link) {
      if (src === "icon") {
        nextIconF = clamp(nextIcon * s.linkRatio, 0.7, 1.8);
        if ($icf) $icf.value = String(nextIconF.toFixed(2));
      } else if (src === "font") {
        nextIcon = clamp(nextIconF / s.linkRatio, 0.7, 1.8);
        if ($ico) $ico.value = String(nextIcon.toFixed(2));
      }
    }

    const out = {
      fontScale: nextFont,
      iconScale: nextIcon,
      iconFontScale: nextIconF,
      link: s.link,
      linkRatio: s.linkRatio
    };

    uiSaveSettings_(out);
    uiUpdateSettingsUi_();

    // Force redraw (symbols + panels)
     try { if (window.__symbolCache && typeof window.__symbolCache.clear === "function") window.__symbolCache.clear(); } catch(_){}
    try { if (typeof renderProgramLegend === "function") renderProgramLegend(); } catch(_){}
    try { if (typeof window.applyFilters === "function") window.applyFilters(); } catch(_){}

    busy = false;
  };

  const $font = document.getElementById("uiFontScale");
  const $ico  = document.getElementById("uiIconScale");
  const $icf  = document.getElementById("uiIconFontScale");
  const $link = document.getElementById("uiLinkIconBtn");
  const $rst  = document.getElementById("uiResetBtn");
  const $ref  = document.getElementById("uiRefreshBtn"); // <-- single declaration

  if ($font) $font.addEventListener("input", () => onChange("ui"));
  if ($ico)  $ico.addEventListener("input", () => onChange("icon"));
  if ($icf)  $icf.addEventListener("input", () => onChange("font"));

  if ($link) {
    $link.addEventListener("click", () => {
      const s = uiLoadSettings_();
      const next = { ...s };
      next.link = !s.link;

      // When turning ON, capture the current ratio (font/icon) so it stays consistent
      if (next.link) {
        const icon = clamp(parseFloat(document.getElementById("uiIconScale")?.value ?? s.iconScale), 0.7, 1.8);
        const fnt  = clamp(parseFloat(document.getElementById("uiIconFontScale")?.value ?? s.iconFontScale), 0.7, 1.8);
        next.linkRatio = (icon > 0) ? (fnt / icon) : 1;
      }

      uiSaveSettings_(next);
      uiUpdateSettingsUi_();

      // Trigger redraw
      try { if (window.__symbolCache && typeof window.__symbolCache.clear === "function") window.__symbolCache.clear(); } catch(_){}
      try { if (typeof renderProgramLegend === "function") renderProgramLegend(); } catch(_){}
      try { if (typeof window.applyFilters === "function") window.applyFilters(); } catch(_){}
      });
  }

  if ($rst) {
    $rst.addEventListener("click", () => {
      const d = { fontScale: 1, iconScale: 1, iconFontScale: 1, link: false, linkRatio: 1 };
      uiSaveSettings_(d);
      uiUpdateSettingsUi_();
      try { if (window.__symbolCache && typeof window.__symbolCache.clear === "function") window.__symbolCache.clear(); } catch(_){}
      try { if (typeof renderProgramLegend === "function") renderProgramLegend(); } catch(_){}
      try { if (typeof window.applyFilters === "function") window.applyFilters(); } catch(_){}
      });
  }

  if ($ref) {
    $ref.addEventListener("click", () => {
      try { fetchData(true); } catch (e) { console.warn("UI Refresh failed:", e); }
    });
  }
}

window.addEventListener("load", () => {
  try{
    const s = uiLoadSettings_();
    uiApplyToDom_(s);
    uiWireSettingsUi_();
  } catch(_){}

/* ===== Robust collapsibles ===== */
function $first(selectorList) {
  const list = selectorList.split(',').map(s => s.trim()).filter(Boolean);
  for (const sel of list) { const el = document.querySelector(sel); if (el) return el; }
  return null;
}
function initCollapsibleEx(headerSel, contentSel, storageKey, defaultOpen = true){
  const header = $first(headerSel);
  const content = $first(contentSel);
  if (!header || !content) return false;

  if (!content.dataset.origDisplay) {
    const v = getComputedStyle(content).display;
    content.dataset.origDisplay = (v && v !== 'none') ? v : 'block';
  }
  const saved = localStorage.getItem(storageKey);
  let expanded = (saved === null) ? defaultOpen : (saved === 'true');

  function applyState(){
    header.setAttribute('aria-expanded', expanded ? 'true' : 'false');
    const chev = header.querySelector('.chev');
    if (chev) chev.textContent = expanded ? '▾' : '▸';
    if (expanded) {
      content.style.removeProperty('display');
      if (getComputedStyle(content).display === 'none') content.style.display = content.dataset.origDisplay || 'block';
      content.classList.remove('is-collapsed');
    } else {
      content.style.display = 'none';
      content.classList.add('is-collapsed');
    }
  }
  applyState();

    const onToggle = () => {
    expanded = !expanded;
    localStorage.setItem(storageKey, String(expanded));
    applyState();
  };

  // ✅ Prevent duplicate listeners if wiring runs more than once
  if (header.dataset.collapseWired !== "1") {
    header.dataset.collapseWired = "1";

    header.addEventListener("click", onToggle);

    // Make header keyboard-accessible once
    if (!header.hasAttribute("tabindex")) header.setAttribute("tabindex", "0");

    header.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        onToggle();
      }
    });
  }

  return true;
}

function wireCollapsiblesWithRetry(maxTries = 50) {
  let tries = 0;

  const tryWire = () => {
    tries++;

    const okRegion = initCollapsibleEx(
      '#regionToggleBtn, #regionHeader',
      '#regionCheckboxes',
      'regionSectionExpanded',
      true
    );

    const okPrograms = initCollapsibleEx(
      '#programsHeader',
      '#programsSection',
      'programsExpanded',
      true
    );

    // NEW: Filters container
    initCollapsibleEx('#filtersHeader', '#filtersSection', 'filtersExpanded', false);

    initCollapsibleEx('#advSearchHeader', '#advSearchSection', 'advSearchExpanded', true);
    initCollapsibleEx('#officeTypeHeader', '#officeTypeSection', 'officeTypeExpanded', true);
    initCollapsibleEx('#mapHeader', '#mapSection', 'mapExpanded', true);
    initCollapsibleEx('#overlaysHeader', '#overlaysSection', 'overlaysExpanded', true);
    initCollapsibleEx('#radarSectionHeader', '#radarSection', 'radarSectionExpanded', true);
    initCollapsibleEx('#wwaSectionHeader', '#wwaSection', 'wwaSectionExpanded', true);
    initCollapsibleEx('#wfoSectionHeader', '#wfoSection', 'wfoSectionExpanded', true);
    initCollapsibleEx('#rfcSectionHeader', '#rfcSection', 'rfcSectionExpanded', true);
    initCollapsibleEx("#cwsuSectionHeader", "#cwsuSection", 'cwsuSectionExpanded', true);
    initCollapsibleEx("#mccSectionHeader", "#mccSection", "mccSectionExpanded", false);
    initCollapsibleEx("#regSectionHeader", "#regSection", "regSectionExpanded", false);
    initCollapsibleEx("#tzSectionHeader", "#tzSection", "tzSectionExpanded", false);
    initCollapsibleEx('#legendHeader', '#legendSection', 'legendExpanded', true);
    initCollapsibleEx('#statusTotalsHeader', '#statusTotalsSection', 'statusTotalsExpanded', true);

    initCollapsibleEx('#downSectionHeader', '#downSection', 'downSectionExpanded', true);

    // Only require region+programs to stop retrying
    if (okRegion && okPrograms) return;

    if (tries < maxTries) {
      setTimeout(tryWire, 100);
    } else {
      console.warn('Collapsibles: forced visible after retries.');
      // Force the known ones visible if needed
      const rc = document.querySelector('#regionCheckboxes');
      const pc = document.querySelector('#programsSection');
      if (rc) rc.style.display = rc.dataset.origDisplay || 'block';
      if (pc) pc.style.display = pc.dataset.origDisplay || 'block';
    }
  };

  tryWire();
}

      }

      // ✅ IMPORTANT: actually wire the CWSU/WFO toggles (otherwise WFO/CWSU never install)
      try { setupLazyCwsuWfoOverlays(); }
      catch (e) { console.error("setupLazyCwsuWfoOverlays failed:", e); }


      // ======================================================
      // Overlay loading strategy (startup performance)
      // ======================================================
      // Heavy overlays are installed only when first turned ON (but visibility is still persisted).
      (function setupOverlayLazyGates() {
        // ---- localStorage helpers ----
        const lsGet = (k) => { try { return localStorage.getItem(k); } catch (_) { return null; } };
        const lsSet = (k, v) => { try { localStorage.setItem(k, v); } catch (_) {} };
        const readBool = (k, defVal=false) => {

          try { return !!JSON.parse(v); } catch (_) { return String(v).trim().toLowerCase() === "true"; }

        const writeBool = (k, val) => lsSet(k, JSON.stringify(!!val));

        // Generic lazy gate for overlays that expose window[installerFn]({view,map})

          const installedFlag = `__${name}Installed`;

          const getLayer = () => {
            try { return (map && typeof map.findLayerById === "function") ? map.findLayerById(layerId) : null; }
            catch (_) { return null; }
          };

          const ensureInstalled = () => {

          tgl.addEventListener("change", () => {
            const on = !!tgl.checked;
            writeBool(visKey, on);

            const layer = getLayer();
            if (layer) {

          if (tgl.checked) {
            if (window.__basePointsRendered) {
              ensureInstalled();
            } else {
              queueOverlayInstall_(name, layerId, ensureInstalled);
              window.__overlayInstallQueue.push(ensureInstalled);
            }
          }

        }

        // Timezones: special (creates both a FeatureLayer + DOM overlay)
        (function setupLazyTimezonesOverlay() {

          if (lsGet("tzVisible") == null) writeBool("tzVisible", false);

        lazyGate({ name: "mcc",   toggleId: "mccToggle",   installerFn: "installMCC",    layerId: "mccFootprintLayer",    visKey: "mccVisible",    defaultVis: false });
        lazyGate({ name: "reg",   toggleId: "regToggle",   installerFn: "installRegion", layerId: "regionFootprintLayer", visKey: "regVisible",    defaultVis: false });
        lazyGate({ name: "radar", toggleId: "radarToggle", installerFn: "installRadar",  layerId: "radarReflLayer",       visKey: "radarVisible",  defaultVis: false });
        lazyGate({ name: "wwa",   toggleId: "wwaToggle",   installerFn: "installWWA",    layerId: "wwaLayer",            visKey: "wwaVisible",    defaultVis: false });

      // Custom zoom dock

      const graphicsLayer = new GraphicsLayer();

      // --- Incremental point update index (key -> Graphic) ---
      window._graphicIndex = new NativeMap();
